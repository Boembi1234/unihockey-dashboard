        ${topOpeners.map(([n,c])=>advBar(n,c,maxO,'var(--score)')).join('')}

      <div>
        <div style="font-size:10px;color:var(--accent3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">🏁 Closer</div>
        ${topClosers.map(([n,c])=>advBar(n,c,maxC,'var(--accent3)')).join('')}
      </div>
    </div>`;
}

// ── 11. Clutch Scorers ────────────────────────────────────────────────────
function renderClutchScorers(scored) {
  const el = document.getElementById('clutchStats');
  if (!el) return;

  // Clutch = scored when score diff was 0 or ±1
  const clutchMap = {}, totalMap = {};
  scored.forEach(g => {
    if (!g.scorer_raw || !g.score_at_goal) return;
    totalMap[g.scorer_raw] = (totalMap[g.scorer_raw]||0)+1;
    const parts = g.score_at_goal.split(':').map(Number);
    if (parts.length===2) {
      const diff = Math.abs(parts[0]-parts[1]);
      if (diff <= 1) clutchMap[g.scorer_raw] = (clutchMap[g.scorer_raw]||0)+1;
    }
  });

  const players = Object.keys(totalMap)
    .filter(p => totalMap[p]>=3)
    .map(p => ({name:p, clutch:clutchMap[p]||0, total:totalMap[p], pct:Math.round((clutchMap[p]||0)/totalMap[p]*100)}))
    .sort((a,b)=>b.clutch-a.clutch).slice(0,8);

  const maxClutch = players[0]?.clutch||1;

  el.innerHTML = `
    <div style="font-size:10px;color:var(--muted);margin-bottom:10px">Tore bei Stand ±1 Tor (knappe Situationen)</div>
    <div style="display:flex;gap:6px;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:8px">

      <span style="font-size:10px;color:var(--muted);width:40px;text-align:right">Total</span>
      <span style="font-size:10px;color:var(--muted);width:40px;text-align:right">%</span>
    </div>
    ${players.map(p => `
      <div class="modal-bar-row">
        <span class="modal-bar-label">${p.name}</span>
        <div class="modal-bar-track"><div class="modal-bar-fill" style="width:${(p.clutch/maxClutch*100).toFixed(1)}%;background:var(--accent3)"></div></div>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--accent3);width:24px;text-align:right">${p.clutch}</span>
        <span style="font-size:11px;color:var(--muted);width:32px;text-align:right">${p.total}</span>

// ── 13. First Goal Time ───────────────────────────────────────────────────
function renderFirstGoalTime(games, scored) {
  const el = document.getElementById('firstGoalTime');
  if (!el) return;

  const firstGoalTimes = [];
  games.forEach(g => {
    const gGoals = scored.filter(gl => gl.game_id===g.game_id && gl.minute_seconds!=null)
      .sort((a,b)=>a.minute_seconds-b.minute_seconds);
    if (gGoals[0]) firstGoalTimes.push(Math.floor(gGoals[0].minute_seconds/60));
  });

  if (!firstGoalTimes.length) { el.innerHTML='<div class="no-data">Keine Daten</div>'; return; }
  const avg = (firstGoalTimes.reduce((s,v)=>s+v,0)/firstGoalTimes.length).toFixed(1);
  const min_ = Math.min(...firstGoalTimes);
  const noFirst = games.length - firstGoalTimes.length;

  // Distribution in 5-min buckets
  const buckets = {};
  firstGoalTimes.forEach(m => { const b=Math.floor(m/5)*5; buckets[b]=(buckets[b]||0)+1; });
  const bEntries = Object.entries(buckets).sort((a,b)=>a[0]-b[0]);
  const maxB = Math.max(...Object.values(buckets),1);

  el.innerHTML = `
    <div class="modal-kpis" style="margin-bottom:14px">
      ${statBox('ø Zeit zum 1. Tor', avg+'\'', 'Minuten', 'var(--accent)')}

      ${statBox('Ohne Tor', noFirst, 'Spiele', 'var(--concede)')}

    <div style="font-size:10px;color:var(--muted);margin-bottom:8px">Verteilung erstes Tor</div>
    ${bEntries.map(([b,c])=>advBar(`${b}'–${parseInt(b)+4}'`, c, maxB, 'var(--accent)')).join('')}`;
}

// ── 14. Back-to-Back ──────────────────────────────────────────────────────
function renderBackToBack(games, scored, conceded) {
  const el = document.getElementById('backToBackStats');
  if (!el) return;

  const sorted = games.filter(g=>g.date&&g.date.startsWith('20')).sort((a,b)=>a.date<b.date?-1:1);

  let b2b=[], normal=[];
  for (let i=0; i<sorted.length; i++) {
    const prev = sorted[i-1];
    const isB2B = prev && (new Date(sorted[i].date)-new Date(prev.date)) <= 2*24*3600*1000;
    const g = sorted[i];
    const s = scored.filter(gl=>gl.game_id===g.game_id).length;
    const c = conceded.filter(gl=>gl.game_id===g.game_id).length;
    const w = gameResult(g,selectedTeamId)==='W';
    if (isB2B) b2b.push({scored:s,conceded:c,win:w});
    else normal.push({scored:s,conceded:c,win:w});
  }

  const avg = arr => arr.length ? (arr.reduce((s,v)=>s+v,0)/arr.length).toFixed(2) : '—';
  const winPct = arr => arr.length ? Math.round(arr.filter(x=>x.win).length/arr.length*100)+'%' : '—';

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div style="text-align:center;background:var(--surface2);border-radius:8px;padding:14px;border:1px solid var(--border)">
        <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Normal</div>
        <div style="font-size:28px;font-family:'Barlow Condensed',sans-serif;font-weight:900;color:var(--accent)">${normal.length}</div>

// ── helpers ───────────────────────────────────────────────────────────────
function getMyScore(game, teamId) {
  const [h, a] = game.result.split(':').map(Number);
  return selectedTeamIds.has(game.home_team_id) ? h : a;
}
function getOppScore(game, teamId) {
  const [h, a] = game.result.split(':').map(Number);
  return selectedTeamIds.has(game.home_team_id) ? a : h;
}
function gameResult(game, teamId) {
  const m = getMyScore(game, teamId), o = getOppScore(game, teamId);
  return m > o ? 'W' : m < o ? 'L' : 'D';
}
function advBar(label, value, max, color='var(--accent)', pct=false) {
  const w = max > 0 ? (value/max*100).toFixed(1) : 0;
  const disp = pct ? value+'%' : value;
  return `<div class="modal-bar-row">
    <span class="modal-bar-label" title="${label}">${label}</span>
    <div class="modal-bar-track"><div class="modal-bar-fill" style="width:${w}%;background:${color}"></div></div>
    <span class="modal-bar-val" style="color:${color}">${disp}</span>
  </div>`;
}
function statBox(label, value, sub='', color='var(--accent)') {
  return `<div class="modal-kpi" style="min-width:90px">
    <div class="modal-kpi-val" style="color:${color}">${value}</div>
    <div class="modal-kpi-lbl">${label}</div>
    ${sub ? `<div style="font-size:10px;color:var(--muted);margin-top:2px">${sub}</div>` : ''}
  </div>`;
}

// ── 1. Streaks ────────────────────────────────────────────────────────────
function renderStreaks(games) {
  const el = document.getElementById('streakViz');
  if (!el) return;
  const sorted = [...games].filter(g => g.date && g.date.startsWith('20'))
    .sort((a,b) => a.date < b.date ? -1 : 1);
  if (!sorted.length) { el.innerHTML = '<div class="no-data">Keine Daten</div>'; return; }

  const results = sorted.map(g => gameResult(g, selectedTeamId));
  // Current streak
  let cur = 1;
  for (let i = results.length-2; i >= 0; i--) {
    if (results[i] === results[results.length-1]) cur++;
    else break;
  }
  // Longest W streak
  let maxW = 0, tmp = 0;
  results.forEach(r => { tmp = r==='W' ? tmp+1 : 0; maxW = Math.max(maxW,tmp); });
  let maxL = 0; tmp = 0;
  results.forEach(r => { tmp = r==='L' ? tmp+1 : 0; maxL = Math.max(maxL,tmp); });

  const last20 = results.slice(-20);
  const colorMap = {W:'var(--score)', L:'var(--concede)', D:'var(--muted)'};
  const boxes = last20.map(r =>
    `<div class="streak-box streak-${r}" title="${r==='W'?'Sieg':r==='L'?'Niederlage':'Unentschieden'}">${r}</div>`
  ).join('');

  const curType = results[results.length-1];
  const curColor = colorMap[curType] || 'var(--muted)';

  el.innerHTML = `
    <div class="modal-kpis" style="margin-bottom:16px">
      ${statBox('Aktuelle Serie', cur+'×'+(curType==='W'?'S':curType==='L'?'N':'U'), '', curColor)}
      ${statBox('Längste Siegserie', maxW, 'Spiele in Folge', 'var(--score)')}
      ${statBox('Längste Niederserie', maxL, 'Spiele in Folge', 'var(--concede)')}
    </div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:2px;text-transform:uppercase">Letzte ${last20.length} Spiele</div>
    <div class="streak-row">${boxes}</div>`;
}

// ── 3. Comeback stats ─────────────────────────────────────────────────────
function renderComebacks(games, scored, conceded) {
  const el = document.getElementById('comebackStats');
  if (!el) return;

  // For each game, check if team was trailing at any point and then won
  let comebacks = 0, blownLeads = 0, maxDeficit = 0, maxLead = 0;
  const allGoals = [...scored, ...conceded];

  games.forEach(g => {
    const gGoals = allGoals
      .filter(gl => gl.game_id === g.game_id)
      .sort((a,b) => a.minute_seconds - b.minute_seconds);

    let myScore = 0, oppScore = 0, wasTrailing = false, wasLeading = false;
    let maxDef = 0, maxLd = 0;

    gGoals.forEach(gl => {
      if (selectedTeamIds.has(gl.team_scored_id)) myScore++;
      else oppScore++;
      const diff = myScore - oppScore;
      if (diff < 0) { wasTrailing = true; maxDef = Math.max(maxDef, -diff); }
      if (diff > 0) { wasLeading = true; maxLd = Math.max(maxLd, diff); }
    });

    const res = gameResult(g, selectedTeamId);
    if (wasTrailing && res === 'W') comebacks++;
    if (wasLeading && res === 'L') blownLeads++;
    maxDeficit = Math.max(maxDeficit, maxDef);
    maxLead    = Math.max(maxLead, maxLd);
  });

  const cbRate = games.length ? Math.round(comebacks/games.length*100) : 0;
  el.innerHTML = `
    <div class="modal-kpis">
      ${statBox('Comebacks', comebacks, `${cbRate}% aller Spiele`, 'var(--accent)')}
      ${statBox('Bleigewinn verspielt', blownLeads, 'Spiele', 'var(--concede)')}
      ${statBox('Grösstes Défizit gewendet', maxDeficit, 'Tore', 'var(--accent3)')}
      ${statBox('Grösste Führung gehalten', maxLead, 'Tore max.', 'var(--score)')}
    </div>
    <div style="margin-top:16px;font-size:12px;color:var(--muted);line-height:1.8">
      ${comebacks > 0 ? `<div style="color:var(--score)">✓ ${comebacks}× aus Rückstand gewonnen</div>` : ''}
      ${blownLeads > 0 ? `<div style="color:var(--concede)">✗ ${blownLeads}× Führung aus der Hand gegeben</div>` : ''}
      ${maxDeficit > 1 ? `<div>Grösster Rückstand der überwunden wurde: <strong style="color:var(--accent)">${maxDeficit} Tore</strong></div>` : ''}
    </div>`;
}

// ── 4. Close games ────────────────────────────────────────────────────────
function renderCloseGames(games, scored, conceded) {
  const el = document.getElementById('closeGames');
  if (!el) return;

  let close=0, closeW=0, closeL=0, closeD=0;
  let big=0, bigW=0;
  games.forEach(g => {
    const m = getMyScore(g, selectedTeamId), o = getOppScore(g, selectedTeamId);
    const diff = Math.abs(m-o);
    const res = gameResult(g, selectedTeamId);
    if (diff <= 1) {
      close++;
      if (res==='W') closeW++;
      else if (res==='L') closeL++;
      else closeD++;
    } else if (diff >= 5) {
      big++;
      if (res==='W') bigW++;
    }
  });
  const closeWpct = close ? Math.round(closeW/close*100) : 0;
  const bigWpct   = big   ? Math.round(bigW/big*100) : 0;

  // Average goals scored/conceded in close vs big games
  el.innerHTML = `
    <div class="modal-kpis">
      ${statBox('Knappe Spiele', close, '≤1 Tor Differenz', 'var(--accent)')}
      ${statBox('Gewonnen', closeWpct+'%', `${closeW}S ${closeD}U ${closeL}N`, 'var(--score)')}
      ${statBox('Klare Spiele', big, '≥5 Tore Diff.', 'var(--muted)')}
      ${statBox('Klare Siege', bigWpct+'%', `${bigW} von ${big}`, 'var(--accent3)')}
    </div>
    <div style="margin-top:14px">
      <div style="font-size:10px;color:var(--muted);margin-bottom:6px">Knappe Spiele (≤1)</div>
      <div style="height:12px;border-radius:6px;background:var(--border);overflow:hidden;display:flex">
        <div style="width:${close?closeW/close*100:0}%;background:var(--score);transition:width .6s"></div>
        <div style="width:${close?closeD/close*100:0}%;background:var(--muted);transition:width .6s"></div>
        <div style="width:${close?closeL/close*100:0}%;background:var(--concede);transition:width .6s"></div>
      </div>
      <div style="font-size:10px;color:var(--muted);margin:8px 0 6px">Klare Spiele (≥5)</div>
      <div style="height:12px;border-radius:6px;background:var(--border);overflow:hidden;display:flex">
        <div style="width:${big?bigW/big*100:0}%;background:var(--score);transition:width .6s"></div>
        <div style="width:${big?(big-bigW)/big*100:0}%;background:var(--concede);transition:width .6s"></div>
      </div>
    </div>`;
}

// ── 6. Scoring Bursts ─────────────────────────────────────────────────────
function renderBursts(scored, numGames) {
  const el = document.getElementById('burstStats');
  if (!el) return;
  const n = numGames || 1;
  // A burst = 2+ goals within 3 minutes (180 sec)
  const byGame = {};
  scored.forEach(g => {
    if (!byGame[g.game_id]) byGame[g.game_id] = [];
    byGame[g.game_id].push(g.minute_seconds);
  });

  let totalBursts = 0, maxBurst = 0, burstGames = 0;
  const burstMinutes = {};

  Object.values(byGame).forEach(times => {
    const sorted = times.filter(t=>t!=null).sort((a,b)=>a-b);
    let inBurst = false, burstStart = null, burstCount = 1;
    for (let i=1; i<sorted.length; i++) {
      if (sorted[i] - sorted[i-1] <= 180) {
        burstCount++;
        if (!inBurst) { inBurst=true; burstStart=sorted[i-1]; }
      } else {
        if (inBurst && burstCount >= 2) {
          totalBursts++;
          maxBurst = Math.max(maxBurst, burstCount);
          const bucket = Math.floor(burstStart/600)*10;
          burstMinutes[bucket] = (burstMinutes[bucket]||0)+1;
        }
        inBurst=false; burstCount=1;
      }
    }
    if (inBurst && burstCount >= 2) {
      totalBursts++;
      maxBurst = Math.max(maxBurst, burstCount);
      const bucket = Math.floor(burstStart/600)*10;
      burstMinutes[bucket] = (burstMinutes[bucket]||0)+1;
    }
  });

  const topBuckets = Object.entries(burstMinutes)
    .sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxB = topBuckets[0]?.[1] || 1;

  el.innerHTML = `
    <div class="modal-kpis" style="margin-bottom:14px">
      ${statBox('Scoring-Bursts', totalBursts, 'gesamt', 'var(--accent)')}
      ${statBox('Max. Tore in Burst', maxBurst, '≤3 Min.', 'var(--accent3)')}
      ${statBox('ø Bursts/Spiel', (totalBursts/n).toFixed(1), '', 'var(--score)')}
    </div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:2px;text-transform:uppercase">Häufigste Burst-Minuten</div>
    ${topBuckets.map(([m,c]) => advBar(`${m}'–${parseInt(m)+9}'`, c, maxB, 'var(--accent3)')).join('')}`;
}

// ── 7. Hat Tricks ─────────────────────────────────────────────────────────
function renderHatTricks(scored) {
  const el = document.getElementById('hatTrickStats');
  if (!el) return;

  const byPlayerGame = {};
  scored.forEach(g => {
    if (!g.scorer_raw) return;
    const key = g.scorer_raw + '|' + g.game_id;
    if (!byPlayerGame[key]) byPlayerGame[key] = {name:g.scorer_raw, game_id:g.game_id, date:g.date, cnt:0, opp:''};
    byPlayerGame[key].cnt++;
    byPlayerGame[key].opp = g.team_scored_id === g.home_team_id ? g.away_team_raw : g.home_team_raw;
  });

  const performances = Object.values(byPlayerGame).filter(p=>p.cnt>=2).sort((a,b)=>b.cnt-a.cnt);
  const hattricks = performances.filter(p=>p.cnt>=3);
  const doubles   = performances.filter(p=>p.cnt===2);

  const playerHT = {};
  hattricks.forEach(p => { playerHT[p.name] = (playerHT[p.name]||0)+1; });
  const topHT = Object.entries(playerHT).sort((a,b)=>b[1]-a[1]).slice(0,5);

  el.innerHTML = `
    <div class="modal-kpis" style="margin-bottom:14px">
      ${statBox('Hat-Tricks (3+)', hattricks.length, 'gesamt', 'var(--accent3)')}
      ${statBox('Doppelpacks (2)', doubles.length, 'gesamt', 'var(--accent)')}
      ${statBox('Bestes Spiel', performances[0]?.cnt||0, performances[0]?.name||'', 'var(--score)')}
    </div>
    ${topHT.length ? `
    <div style="font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:2px;text-transform:uppercase">Meiste Hat-Tricks</div>
    ${topHT.map(([name,cnt]) => advBar(name, cnt, topHT[0][1], 'var(--accent3)')).join('')}` : ''}
    ${performances.slice(0,5).map(p => `
    <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
      <span style="color:var(--accent3);font-weight:700;font-family:'Barlow Condensed',sans-serif;font-size:16px">${p.cnt}×</span>
      <span style="color:var(--text);flex:1;padding:0 10px">${p.name}</span>
      <span style="color:var(--muted);font-size:11px">${p.date||''}</span>
    </div>`).join('')}`;
}

// ── 8. Goal Distribution ──────────────────────────────────────────────────
function renderGoalDistribution(games) {
  const ctx = document.getElementById('chartGoalDist');

  const dist = {};
  games.forEach(g => {

  const labels = Array.from({length: maxG+1}, (_,i) => i);

  if (charts.goalDist) charts.goalDist.destroy();

    type: 'bar',

      labels: labels.map(l=>l+' Tore'),
      datasets: [{
        label: 'Anzahl Spiele',

        backgroundColor: labels.map(l => {
          const t = maxG>0?l/maxG:0;

        }),

// ── 9. Opener vs Closer ───────────────────────────────────────────────────
function renderOpenerCloser(scored) {
  const el = document.getElementById('openerCloser');
  if (!el) return;

  // Opener = scored goal that was 0:1 for team (first goal in game)
  // Closer = scored last goal of the game (final goal in winning game)
  const firstGoals = {}, lastGoals = {};
  const gameGoalsByTime = {};
  scored.forEach(g => {
    if (!gameGoalsByTime[g.game_id]) gameGoalsByTime[g.game_id] = [];
    gameGoalsByTime[g.game_id].push(g);
  });

  // Opener: player who scored the team's first goal
  const openerMap = {}, closerMap = {};
  Object.values(gameGoalsByTime).forEach(goals => {
    const sorted = goals.filter(g=>g.minute_seconds!=null).sort((a,b)=>a.minute_seconds-b.minute_seconds);
    if (sorted[0]?.scorer_raw) openerMap[sorted[0].scorer_raw] = (openerMap[sorted[0].scorer_raw]||0)+1;
    if (sorted[sorted.length-1]?.scorer_raw) closerMap[sorted[sorted.length-1].scorer_raw] = (closerMap[sorted[sorted.length-1].scorer_raw]||0)+1;
  });

  const topOpeners = Object.entries(openerMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const topClosers = Object.entries(closerMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxO = topOpeners[0]?.[1]||1, maxC = topClosers[0]?.[1]||1;

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div>
        <div style="font-size:10px;color:var(--score);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">🚀 Opener</div>
        ${topOpeners.map(([n,c])=>advBar(n,c,maxO,'var(--score)')).join('')}
      </div>
      <div>
        <div style="font-size:10px;color:var(--accent3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">🏁 Closer</div>
        ${topClosers.map(([n,c])=>advBar(n,c,maxC,'var(--accent3)')).join('')}
      </div>
    </div>`;
}

// ── 11. Clutch Scorers ────────────────────────────────────────────────────
function renderClutchScorers(scored) {
  const el = document.getElementById('clutchStats');
  if (!el) return;

  // Clutch = scored when score diff was 0 or ±1
  const clutchMap = {}, totalMap = {};
  scored.forEach(g => {
    if (!g.scorer_raw || !g.score_at_goal) return;
    totalMap[g.scorer_raw] = (totalMap[g.scorer_raw]||0)+1;
    const parts = g.score_at_goal.split(':').map(Number);
    if (parts.length===2) {
      const diff = Math.abs(parts[0]-parts[1]);
      if (diff <= 1) clutchMap[g.scorer_raw] = (clutchMap[g.scorer_raw]||0)+1;
    }
  });

  const players = Object.keys(totalMap)
    .filter(p => totalMap[p]>=3)
    .map(p => ({name:p, clutch:clutchMap[p]||0, total:totalMap[p], pct:Math.round((clutchMap[p]||0)/totalMap[p]*100)}))
    .sort((a,b)=>b.clutch-a.clutch).slice(0,8);

  const maxClutch = players[0]?.clutch||1;

  el.innerHTML = `
    <div style="font-size:10px;color:var(--muted);margin-bottom:10px">Tore bei Stand ±1 Tor (knappe Situationen)</div>
    <div style="display:flex;gap:6px;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:8px">
      <span style="font-size:10px;color:var(--muted);flex:1;padding-left:4px">Spieler</span>
      <span style="font-size:10px;color:var(--accent3);width:50px;text-align:right">Clutch</span>
      <span style="font-size:10px;color:var(--muted);width:40px;text-align:right">Total</span>
      <span style="font-size:10px;color:var(--muted);width:40px;text-align:right">%</span>
    </div>
    ${players.map(p => `
      <div class="modal-bar-row">
        <span class="modal-bar-label">${p.name}</span>
        <div class="modal-bar-track"><div class="modal-bar-fill" style="width:${(p.clutch/maxClutch*100).toFixed(1)}%;background:var(--accent3)"></div></div>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--accent3);width:24px;text-align:right">${p.clutch}</span>
        <span style="font-size:11px;color:var(--muted);width:32px;text-align:right">${p.total}</span>
        <span style="font-size:11px;color:var(--muted);width:36px;text-align:right">${p.pct}%</span>

}

// ── 12. Location Stats ────────────────────────────────────────────────────
function renderLocationStats(games, scored, conceded) {
  const ctx = document.getElementById('chartLocation');
  if (!ctx) return;

  const locs = {};
  games.forEach(g => {
    const isHome = selectedTeamIds.has(g.home_team_id);
    const city = isHome ? (g.location_city||'Unbekannt') : (g.location_city||'Auswärts');
    if (!locs[city]) locs[city] = {games:0,scored:0,conceded:0,wins:0};
    locs[city].games++;
    if (gameResult(g, selectedTeamId)==='W') locs[city].wins++;

  scored.forEach(g => {

        y:{grid:{color:'rgba(30,37,48,0.8)'},ticks:{color:'#5a6478',font:{size:10}}}

function renderFirstGoalTime(games, scored) {
  const el = document.getElementById('firstGoalTime');
  if (!el) return;

  const firstGoalTimes = [];
  games.forEach(g => {
    const gGoals = scored.filter(gl => gl.game_id===g.game_id && gl.minute_seconds!=null)
      .sort((a,b)=>a.minute_seconds-b.minute_seconds);
    if (gGoals[0]) firstGoalTimes.push(Math.floor(gGoals[0].minute_seconds/60));
  });

  if (!firstGoalTimes.length) { el.innerHTML='<div class="no-data">Keine Daten</div>'; return; }
  const avg = (firstGoalTimes.reduce((s,v)=>s+v,0)/firstGoalTimes.length).toFixed(1);
  const min_ = Math.min(...firstGoalTimes);
  const noFirst = games.length - firstGoalTimes.length;

  // Distribution in 5-min buckets
  const buckets = {};
  firstGoalTimes.forEach(m => { const b=Math.floor(m/5)*5; buckets[b]=(buckets[b]||0)+1; });
  const bEntries = Object.entries(buckets).sort((a,b)=>a[0]-b[0]);
  const maxB = Math.max(...Object.values(buckets),1);

  el.innerHTML = `
    <div class="modal-kpis" style="margin-bottom:14px">
      ${statBox('ø Zeit zum 1. Tor', avg+'\'', 'Minuten', 'var(--accent)')}
      ${statBox('Frühestes Tor', min_+'\'', 'Minute', 'var(--score)')}
      ${statBox('Ohne Tor', noFirst, 'Spiele', 'var(--concede)')}
    </div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:8px">Verteilung erstes Tor</div>
    ${bEntries.map(([b,c])=>advBar(`${b}'–${parseInt(b)+4}'`, c, maxB, 'var(--accent)')).join('')}`;
}

// ── Penalties ─────────────────────────────────────────────────────────────
function computeSpecialTeams(teamIds, gameIds) {
  // Only 2-min penalties create PP/PK situations
  const gamePens  = (DB.penalties||[]).filter(p => gameIds.has(p.game_id) && p.duration_min === 2);
  const gameGoals = (DB.goals||[]).filter(g => gameIds.has(g.game_id));

  const pensByGame  = {};
  gamePens.forEach(p  => { (pensByGame[p.game_id]  = pensByGame[p.game_id]  || []).push(p); });
  const goalsByGame = {};
  gameGoals.forEach(g => { (goalsByGame[g.game_id] = goalsByGame[g.game_id] || []).push(g); });

  let ppOpp=0, ppGoals=0, pkOpp=0, pkGA=0, shGoals=0;
  const ppScorers={}, ppByOpp={}, pkByOpp={}, ppBySeason={}, pkBySeason={};

  Object.entries(pensByGame).forEach(([gid, pens]) => {
    const goals = goalsByGame[gid] || [];
    pens.forEach(pen => {
      const isOwn = teamIds.has(pen.team_id);
      const t0 = pen.minute_seconds || 0;
      const t1 = t0 + 120;
      const inWin = goals.filter(g => g.minute_seconds != null && g.minute_seconds >= t0 && g.minute_seconds <= t1);

      if (!isOwn) {
        // Opponent penalty → PP for us
        ppOpp++;
        const ourG = inWin.filter(g => teamIds.has(g.team_scored_id));
        ppGoals += ourG.length;
        ourG.forEach(g => {
          if (g.scorer_raw) ppScorers[g.scorer_raw] = (ppScorers[g.scorer_raw]||0)+1;
          if (pen.team_raw)  ppByOpp[pen.team_raw]   = (ppByOpp[pen.team_raw]||0)+1;
          if (pen.season)    ppBySeason[pen.season]   = (ppBySeason[pen.season]||0)+1;
        });
      } else {
        // Own penalty → PK for us
        pkOpp++;
        pkGA    += inWin.filter(g => !teamIds.has(g.team_scored_id)).length;
        shGoals += inWin.filter(g =>  teamIds.has(g.team_scored_id)).length;
        if (pen.season) pkBySeason[pen.season] = (pkBySeason[pen.season]||0)+1;
      }
    });
  });

  const ppPct = ppOpp > 0 ? (ppGoals/ppOpp*100).toFixed(1) : '0.0';
  const pkPct = pkOpp > 0 ? ((pkOpp-pkGA)/pkOpp*100).toFixed(1) : '—';
  return { ppOpp, ppGoals, ppPct, pkOpp, pkGA, pkPct, shGoals,
           ppScorers, ppByOpp, ppBySeason, pkBySeason };
}

function renderPenalties(scored, conceded, games) {
  const container = document.getElementById('penaltiesContent');
  if (!container || !DB.penalties) return;

  const gameIds = new Set(games.map(g => g.game_id));

  // Own penalties (filtered by season already via games)
  let pen = (DB.penalties||[]).filter(p => gameIds.has(p.game_id) && selectedTeamIds.has(p.team_id));
  // Opponent penalties in same games
  let oppPen = (DB.penalties||[]).filter(p => gameIds.has(p.game_id) && !selectedTeamIds.has(p.team_id));

  if (!pen.length && !oppPen.length) {
    container.innerHTML = '<div style="color:var(--muted);font-size:12px">Keine Strafdaten verfügbar</div>';
    return;
  }

  const gp  = games.length || 1;
  const ppg = (pen.length / gp).toFixed(2);
  const st  = computeSpecialTeams(selectedTeamIds, gameIds);

  // Own penalty breakdown
  const playerMap = {};
  pen.forEach(p => { if(p.player_raw) playerMap[p.player_raw] = (playerMap[p.player_raw]||0)+1; });
  const topPlayers = Object.entries(playerMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const plMax = topPlayers[0]?.[1] || 1;

  const reasonMap = {};
  pen.forEach(p => { if(p.reason) reasonMap[p.reason] = (reasonMap[p.reason]||0)+1; });
  const topReasons = Object.entries(reasonMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const rMax = topReasons[0]?.[1] || 1;

  const periodMap = {1:0,2:0,3:0,4:0};
  pen.forEach(p => { if(p.period) periodMap[p.period]=(periodMap[p.period]||0)+1; });
  const pMax = Math.max(...Object.values(periodMap), 1);

  const minBuckets = Array(13).fill(0);
  pen.forEach(p => {
    if (p.minute_seconds != null) minBuckets[Math.min(Math.floor(p.minute_seconds/300),12)]++;
  });
  const mMax = Math.max(...minBuckets, 1);

  // PP scorers
  const ppSc = Object.entries(st.ppScorers).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const ppScMax = ppSc[0]?.[1] || 1;

  // PP by season
  const ppSeasons = Object.entries(st.ppBySeason).sort((a,b)=>a[0]-b[0]);
  const pkSeasons = Object.entries(st.pkBySeason).sort((a,b)=>a[0]-b[0]);

  const sbar = (label, cnt, max, color='var(--accent)') => `
    <div class="modal-bar-row">
      <span class="modal-bar-label" title="${label}">${label}</span>
      <div class="modal-bar-track"><div class="modal-bar-fill" style="width:${max>0?(cnt/max*100).toFixed(1):0}%;background:${color}"></div></div>
      <span class="modal-bar-val">${cnt}</span>
    </div>`;

  const kpi = (val, lbl, color) =>
    `<div class="kpi" style="--accent-color:${color}"><div class="kpi-val">${val}</div><div class="kpi-label">${lbl}</div></div>`;

  container.innerHTML = `
    <!-- ── Penalty overview KPIs ── -->
    <div class="section-header">Strafen</div>
    <div class="kpi-row" style="margin-bottom:20px">
      ${kpi(pen.length,       'Strafen total',    '#e67e22')}
      ${kpi(ppg,              'Strafen / Spiel',  '#e67e22')}
      ${kpi(pen.filter(p=>p.duration_min===2).length,  "2'-Strafen",  'var(--accent3)')}
      ${kpi(pen.filter(p=>p.duration_min>=10).length,  "10'-Strafen", 'var(--accent2)')}
      ${kpi(oppPen.length,    'Geg. Strafen',     'var(--score)')}
    </div>

    <!-- ── Powerplay / Boxplay KPIs ── -->
    <div class="section-header">Powerplay (PP) &amp; Boxplay (PK)</div>
    <div class="kpi-row" style="margin-bottom:20px">
      ${kpi(st.ppOpp,   'PP-Chancen',      'var(--score)')}
      ${kpi(st.ppGoals, 'PP-Tore',         'var(--score)')}
      ${kpi(st.ppPct+'%', 'PP-Effizienz', 'var(--score)')}
      ${kpi(st.pkOpp,   'PK-Situationen',  '#e67e22')}
      ${kpi(st.pkGA,    'Gegentore im PK', 'var(--concede)')}
      ${kpi(st.pkPct+'%', 'PK-Erfolg',    st.pkPct !== '—' && parseFloat(st.pkPct)>=80 ? 'var(--score)' : 'var(--accent3)')}
      ${kpi(st.shGoals, 'Unterzahltore',   'var(--accent)')}
    </div>

    <!-- ── Three-column detail ── -->
    <div class="grid-3">
      <div>
        <div class="section-header">Meist bestrafte Spieler</div>
        ${topPlayers.map(([n,c]) => sbar(n,c,plMax,'#e67e22')).join('')}
        <div class="section-header" style="margin-top:16px">Strafgründe</div>
        ${topReasons.map(([r,c]) => sbar(r,c,rMax,'var(--accent3)')).join('')}
      </div>
      <div>
        <div class="section-header">PP-Torschützen</div>
        ${ppSc.length
          ? ppSc.map(([n,c]) => sbar(n,c,ppScMax,'var(--score)')).join('')
          : '<div style="color:var(--muted);font-size:12px">Keine PP-Tore</div>'}
        <div class="section-header" style="margin-top:16px">Strafen nach Drittel</div>
        ${sbar('1. Drittel',    periodMap[1], pMax, 'rgba(0,229,255,0.7)')}
        ${sbar('2. Drittel',    periodMap[2], pMax, 'rgba(0,229,255,0.7)')}
        ${sbar('3. Drittel',    periodMap[3], pMax, 'rgba(0,229,255,0.7)')}
        ${sbar('Verlängerung',  periodMap[4], pMax, 'rgba(255,71,87,0.7)')}
      </div>
      <div>
        <div class="section-header">Strafen nach Minute</div>
        ${minBuckets.map((c,i) => sbar(i*5+'\u2013'+(i*5+5)+"'", c, mMax, 'rgba(231,76,60,0.6)')).join('')}
        ${ppSeasons.length > 1 ? `
          <div class="section-header" style="margin-top:16px">PP-Tore nach Saison</div>
          ${ppSeasons.map(([s,c]) => sbar(s+'/'+(parseInt(s)+1).toString().slice(-2), c, Math.max(...ppSeasons.map(e=>e[1]),1), 'var(--score)')).join('')}
        ` : ''}
      </div>
    </div>
  `;
}
