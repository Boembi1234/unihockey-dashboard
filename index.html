// ── Player Modal ──────────────────────────────────────────────────────────
function openPlayerModal(playerName, scored, conceded, games) {
  const pGoals   = scored.filter(g => g.scorer_raw === playerName);
  const pAssists = scored.filter(g => g.assist_raw === playerName);

  // ── KPIs ──────────────────────────────────────────────────────────────
  const totalGoals   = pGoals.length;
  const totalAssists = pAssists.length;
  const totalPoints  = totalGoals + totalAssists;
  const gamesScored  = new Set(pGoals.map(g => g.game_id)).size;
  const gamesPlayed  = new Set([...pGoals, ...pAssists].map(g => g.game_id)).size;
  const gpg = gamesPlayed ? (totalGoals / gamesPlayed).toFixed(2) : 0;

  // ── By period ──────────────────────────────────────────────────────────
  const byPeriod = [0,0,0,0];
  pGoals.forEach(g => { if (g.period >= 1 && g.period <= 4) byPeriod[g.period-1]++; });

  // ── By 10-min bucket ──────────────────────────────────────────────────
  const byMinute = {};
  pGoals.forEach(g => {
    if (g.minute_seconds == null) return;
    const b = Math.floor(g.minute_seconds / 600) * 10;
    byMinute[b] = (byMinute[b]||0) + 1;
  });
  const minuteEntries = Object.entries(byMinute)
    .map(([m,c]) => ({m: parseInt(m), c}))
    .sort((a,b) => b.c - a.c);
  const maxMin = minuteEntries[0]?.c || 1;

  // ── Home vs Away ───────────────────────────────────────────────────────
  let homeGoals = 0, awayGoals = 0;
  pGoals.forEach(g => {
    if (g.team_scored_id === g.home_team_id) homeGoals++;
    else awayGoals++;
  });

  // ── By weekday ────────────────────────────────────────────────────────
  const byDay = {};
  pGoals.forEach(g => { if (g.weekday) byDay[g.weekday] = (byDay[g.weekday]||0)+1; });
  const dayOrder = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const dayDE    = ['Mo','Di','Mi','Do','Fr','Sa','So'];
  const dayEntries = dayOrder
    .filter(d => byDay[d])
    .map(d => ({d, de: dayDE[dayOrder.indexOf(d)], c: byDay[d]}))
    .sort((a,b) => b.c - a.c);
  const maxDay = dayEntries[0]?.c || 1;

  // ── By opponent ────────────────────────────────────────────────────────
  const byOpp = {};
  pGoals.forEach(g => {
    const opp = g.team_scored_id === g.home_team_id ? g.away_team_raw : g.home_team_raw;
    if (opp) byOpp[opp] = (byOpp[opp]||0)+1;
  });
  const oppEntries = Object.entries(byOpp)
    .map(([o,c]) => ({o,c}))
    .sort((a,b) => b.c - a.c)
    .slice(0, 8);
  const maxOpp = oppEntries[0]?.c || 1;

  // ── By time slot ──────────────────────────────────────────────────────
  const slots = [
    {label:'09–12', min:540,  max:720},
    {label:'12–16', min:720,  max:960},
    {label:'16–18', min:960,  max:1080},
    {label:'18–21', min:1080, max:1260},
    {label:'21+',   min:1260, max:9999},
  ];
  const bySlot = slots.map(() => 0);
  pGoals.forEach(g => {
    const t = parseTime(g.game_time);
    if (t == null) return;
    const i = slots.findIndex(s => t >= s.min && t < s.max);
    if (i >= 0) bySlot[i]++;
  });
  const maxSlot = Math.max(...bySlot, 1);

  // ── Season split ──────────────────────────────────────────────────────
  const bySeason = {};
  pGoals.forEach(g => { bySeason[g.season] = (bySeason[g.season]||0)+1; });
  const seasonEntries = Object.entries(bySeason).sort((a,b) => a[0]-b[0]);

  // ── Last 5 goals ──────────────────────────────────────────────────────
  const last5 = [...pGoals].sort((a,b) => b.date < a.date ? -1 : 1).slice(0,5);

  // ── Bar helper ────────────────────────────────────────────────────────
  const bar = (label, cnt, maxCnt, color='var(--accent)') => `
    <div class="modal-bar-row">
      <span class="modal-bar-label" title="${label}">${label}</span>
      <div class="modal-bar-track">
        <div class="modal-bar-fill" style="width:${(cnt/maxCnt*100).toFixed(1)}%;background:${color}"></div>
      </div>
      <span class="modal-bar-val">${cnt}</span>
    </div>`;

  // ── Build HTML ────────────────────────────────────────────────────────
  const content = `
    <div class="modal-player-header">
      <div class="modal-player-name">${playerName}</div>
      <div class="modal-player-team" style="color:var(--muted)">Torschützen-Profil</div>
    </div>

    <div class="modal-kpis">
      <div class="modal-kpi"><div class="modal-kpi-val" style="color:var(--accent)">${totalGoals}</div><div class="modal-kpi-lbl">Tore</div></div>
      <div class="modal-kpi"><div class="modal-kpi-val" style="color:#4CAF50">${totalAssists}</div><div class="modal-kpi-lbl">Vorlagen</div></div>
      <div class="modal-kpi"><div class="modal-kpi-val" style="color:var(--accent3)">${totalPoints}</div><div class="modal-kpi-lbl">Punkte</div></div>
      <div class="modal-kpi"><div class="modal-kpi-val" style="color:var(--muted)">${gamesPlayed}</div><div class="modal-kpi-lbl">Spiele</div></div>
      <div class="modal-kpi"><div class="modal-kpi-val" style="color:var(--accent)">${gpg}</div><div class="modal-kpi-lbl">Tore/Spiel</div></div>
      <div class="modal-kpi"><div class="modal-kpi-val" style="color:var(--accent2)">${homeGoals}</div><div class="modal-kpi-lbl">Heim</div></div>
      <div class="modal-kpi"><div class="modal-kpi-val" style="color:#9C27B0">${awayGoals}</div><div class="modal-kpi-lbl">Auswärts</div></div>
    </div>

    <div class="modal-grid">

      <!-- Minuten (10er) -->
      <div class="modal-section">
        <div class="modal-section-title">⏱ Tore nach Spielminute</div>
        ${minuteEntries.length ? minuteEntries.map(e =>
          bar(`${e.m}'–${e.m+9}'`, e.c, maxMin, 'var(--accent)')
        ).join('') : '<div style="color:var(--muted);font-size:12px">Keine Daten</div>'}
      </div>

      <!-- Drittel -->
      <div class="modal-section">
        <div class="modal-section-title">🏒 Tore nach Drittel</div>
        ${['1. Drittel','2. Drittel','3. Drittel','Verlängerung'].map((lbl,i) =>
          bar(lbl, byPeriod[i], Math.max(...byPeriod,1), ['#00e5ff','#4CAF50','#FF9800','#e74c3c'][i])
        ).join('')}
      </div>

      <!-- Wochentag -->
      <div class="modal-section">
        <div class="modal-section-title">📅 Tore nach Wochentag</div>
        ${dayEntries.length ? dayEntries.map(e =>
          bar(e.d, e.c, maxDay, 'var(--accent3)')
        ).join('') : '<div style="color:var(--muted);font-size:12px">Keine Daten</div>'}
      </div>

      <!-- Spielzeit -->
      <div class="modal-section">
        <div class="modal-section-title">🕐 Tore nach Spielzeit</div>
        ${slots.map((s,i) =>
          bySlot[i] ? bar(s.label, bySlot[i], maxSlot, '#9C27B0') : ''
        ).join('')}
      </div>

      <!-- Gegner -->
      <div class="modal-section modal-full">
        <div class="modal-section-title">🆚 Tore gegen Gegner</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 24px">
          ${oppEntries.map(e =>
            bar(e.o.length > 22 ? e.o.slice(0,20)+'…' : e.o, e.c, maxOpp, 'var(--accent2)')
          ).join('')}
        </div>
      </div>

      <!-- Saison -->
      ${seasonEntries.length > 1 ? `
      <div class="modal-section">
        <div class="modal-section-title">📆 Tore nach Saison</div>
        ${seasonEntries.map(([s,c]) =>
          bar(`${s}/${parseInt(s)+1}`, c, Math.max(...seasonEntries.map(x=>x[1]),1), '#4CAF50')
        ).join('')}
      </div>` : ''}

      <!-- Letzte Tore -->
      <div class="modal-section ${seasonEntries.length > 1 ? '' : 'modal-full'}">
        <div class="modal-section-title">⚡ Letzte Tore</div>
        ${last5.map(g => `
          <div style="display:flex;justify-content:space-between;align-items:center;
                      padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
            <span style="color:var(--muted)">${g.date || ''}</span>
            <span style="color:var(--text)">${g.minute || ''}</span>
            <span style="color:var(--accent3)">${g.score_at_goal || ''}</span>
            <span style="color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
              ${g.team_scored_id === g.home_team_id
                ? `vs ${g.away_team_raw}`
                : `@ ${g.home_team_raw}`}
            </span>
            ${g.assist_raw ? `<span style="color:var(--muted);font-size:11px">↪ ${g.assist_raw}</span>` : '<span></span>'}
          </div>
        `).join('')}
      </div>

    </div>
  `;

  document.getElementById('modalContent').innerHTML = content;
  document.getElementById('playerModal').classList.add('open');
}

function closeModal() {
  document.getElementById('playerModal').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });



// ══════════════════════════════════════════════════════════════════════
// PLAYER PAGE
// ══════════════════════════════════════════════════════════════════════

let playerCharts = {};
let selectedPlayer = null;
let playerSelectedSeason = 'all';
let allPlayers = [];

function showPage(page) {
  ['team','player','league'].forEach(p => {
    document.getElementById('tab'+p.charAt(0).toUpperCase()+p.slice(1))
      .classList.toggle('active', p === page);
  });
  document.getElementById('teamSelectorBar').style.display = page==='team'   ? '' : 'none';
  document.getElementById('mainContent').style.display     = page==='team'   ? '' : 'none';
  document.getElementById('playerPage').style.display      = page==='player' ? '' : 'none';
  document.getElementById('leaguePage').style.display      = page==='league' ? '' : 'none';
  if (page === 'league') renderLeaguePage();
}

function buildAllPlayers() {
  const map = new Map();
  (DB.goals || []).forEach(g => {
    if (g.scorer_raw) {
      if (!map.has(g.scorer_raw)) map.set(g.scorer_raw, { goals: 0, assists: 0 });
      map.get(g.scorer_raw).goals++;
    }
    if (g.assist_raw) {
      if (!map.has(g.assist_raw)) map.set(g.assist_raw, { goals: 0, assists: 0 });
      map.get(g.assist_raw).assists++;
    }
  });
  allPlayers = [...map.entries()]
    .map(([name, s]) => ({ name, ...s }))
    .sort((a, b) => (b.goals + b.assists) - (a.goals + a.assists));
}

function buildPlayerSeasonPills() {
  const container = document.getElementById('playerSeasonPills');
  if (!container) return;
  container.querySelectorAll('[data-season]:not([data-season="all"])').forEach(b => b.remove());
  const seasons = DB.seasons || [...new Set((DB.goals||[]).map(g => g.season).filter(Boolean))].sort();
  seasons.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'pill';
    btn.dataset.season = s;
    btn.textContent = `${s}/${String(s+1).slice(-2)}`;
    btn.onclick = () => setPlayerSeason(btn, String(s));
    container.appendChild(btn);
  });
}

function setPlayerSeason(el, val) {
  document.querySelectorAll('#playerSeasonPills .pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  playerSelectedSeason = val;
  if (selectedPlayer) renderPlayerPage(selectedPlayer);
}

function onPlayerSearch() {
  const raw = document.getElementById('playerSearchInput').value;
  const q   = raw.trim().toLowerCase();
  const dd  = document.getElementById('playerAutocomplete');
  if (q.length < 1) { dd.classList.remove('open'); return; }

  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const matches = allPlayers.filter(p => p.name.toLowerCase().includes(q)).slice(0, 14);
  if (!matches.length) { dd.classList.remove('open'); return; }

  dd.innerHTML = matches.map(p => {
    const hi = p.name.replace(new RegExp(`(${esc})`, 'gi'), '<mark>$1</mark>');
    return `<div class="player-ac-item" onmousedown="selectPlayer('${p.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
      <span>${hi}</span>
      <span class="ac-pts">${p.goals}G&nbsp;${p.assists}A</span>
    </div>`;
  }).join('');
  dd.classList.add('open');
}

function selectPlayer(name) {
  selectedPlayer = name;
  document.getElementById('playerSearchInput').value = name;
  document.getElementById('playerAutocomplete').classList.remove('open');
  renderPlayerPage(name);
}

function getPlayerData(name) {
  let goals   = (DB.goals || []).filter(g => g.scorer_raw === name);
  let assists = (DB.goals || []).filter(g => g.assist_raw === name);
  if (playerSelectedSeason !== 'all') {
    const s = parseInt(playerSelectedSeason);
    goals   = goals.filter(g => g.season === s);
    assists = assists.filter(g => g.season === s);
  }
  return { goals, assists };
}

function pBar(label, cnt, maxCnt, color) {
  const pct = maxCnt > 0 ? (cnt / maxCnt * 100).toFixed(1) : 0;
  return `<div class="modal-bar-row">
    <span class="modal-bar-label">${label}</span>
    <div class="modal-bar-track"><div class="modal-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <span class="modal-bar-val">${cnt}</span>
  </div>`;
}

function renderPlayerPage(name) {
  const { goals, assists } = getPlayerData(name);

  // ── Core stats ─────────────────────────────────────────────────────
  const allGameIds = new Set([...goals.map(g => g.game_id), ...assists.map(g => g.game_id)]);
  const gp  = allGameIds.size;
  const pts = goals.length + assists.length;
  const gpg = gp ? (goals.length / gp).toFixed(2) : '—';
  const apg = gp ? (assists.length / gp).toFixed(2) : '—';
  const ppg = gp ? (pts / gp).toFixed(2) : '—';

  const goalsByGame = {};
  goals.forEach(g => { goalsByGame[g.game_id] = (goalsByGame[g.game_id] || 0) + 1; });
  const hatTricks = Object.values(goalsByGame).filter(n => n >= 3).length;

  const allSeasons = [...new Set([...goals, ...assists].map(g => g.season).filter(Boolean))].sort();
  const seasonGoals = goals.reduce((m, g) => { if (g.season) m[g.season] = (m[g.season]||0)+1; return m; }, {});
  const bestSeasonEntry = Object.entries(seasonGoals).sort((a,b) => b[1]-a[1])[0];
  const bestSeason = bestSeasonEntry ? `${bestSeasonEntry[0]}/${String(parseInt(bestSeasonEntry[0])+1).slice(-2)} (${bestSeasonEntry[1]}G)` : '—';

  // ── Avatar initials ─────────────────────────────────────────────────
  const parts = name.trim().split(/\s+/);
  const initials = parts.length >= 2
    ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
    : name.slice(0,2).toUpperCase();

  // ── Render skeleton ─────────────────────────────────────────────────
  document.getElementById('playerContent').innerHTML = `
    <div class="player-hero">
      <div class="player-avatar">${initials}</div>
      <div>
        <div class="player-hero-name">${name}</div>
        <div class="player-hero-sub">L-UPL · ${allSeasons.length} Saison${allSeasons.length !== 1 ? 'en' : ''} · Beste Saison: ${bestSeason}</div>
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi" style="--accent-color:var(--score)">
        <div class="kpi-val">${goals.length}</div><div class="kpi-label">Tore</div>
      </div>
      <div class="kpi" style="--accent-color:var(--accent3)">
        <div class="kpi-val">${assists.length}</div><div class="kpi-label">Assists</div>
      </div>
      <div class="kpi" style="--accent-color:var(--accent)">
        <div class="kpi-val">${pts}</div><div class="kpi-label">Punkte</div>
      </div>
      <div class="kpi" style="--accent-color:var(--muted)">
        <div class="kpi-val">${gp}</div><div class="kpi-label">Spiele</div>
      </div>
      <div class="kpi" style="--accent-color:var(--score)">
        <div class="kpi-val">${gpg}</div><div class="kpi-label">G / Spiel</div>
      </div>
      <div class="kpi" style="--accent-color:var(--accent3)">
        <div class="kpi-val">${apg}</div><div class="kpi-label">A / Spiel</div>
      </div>
      <div class="kpi" style="--accent-color:var(--accent)">
        <div class="kpi-val">${ppg}</div><div class="kpi-label">P / Spiel</div>
      </div>
      <div class="kpi" style="--accent-color:#e67e22">
        <div class="kpi-val">${hatTricks}</div><div class="kpi-label">Hat-Tricks</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title"><span class="dot"></span>Punkte pro Saison</div>
        <canvas id="pcSeasonChart" height="190"></canvas>
      </div>
      <div class="card">
        <div class="card-title"><span class="dot" style="background:var(--accent3)"></span>Drittel-Verteilung</div>
        <canvas id="pcPeriodChart" height="190"></canvas>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title"><span class="dot" style="background:var(--score)"></span>Tore nach Spielminute</div>
        <canvas id="pcMinuteChart" height="190"></canvas>
      </div>
      <div class="card">
        <div class="card-title"><span class="dot" style="background:#e67e22"></span>Heim / Auswärts &amp; Spielstand</div>
        <div id="pcContext" style="padding-top:8px"></div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title"><span class="dot" style="background:var(--accent2)"></span>Tore gegen Gegner</div>
        <div id="pcOpponents"></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="dot" style="background:var(--accent3)"></span>Assist-Netzwerk</div>
        <div id="pcAssistNet"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot"></span>Spielprotokoll</div>
      <div id="pcGameLog" style="overflow-x:auto;max-height:420px;overflow-y:auto"></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot" style="background:#e67e22"></span>Strafen</div>
      <div id="pcPenalties"></div>
    </div>
  `;

  // ── Destroy old charts ──────────────────────────────────────────────
  Object.values(playerCharts).forEach(c => c.destroy());
  playerCharts = {};

  const pScales = {
    x: { grid: { color: 'rgba(30,37,48,0.8)' }, ticks: { color: '#5a6478', font: { size: 10 } } },
    y: { grid: { color: 'rgba(30,37,48,0.8)' }, ticks: { color: '#5a6478' }, beginAtZero: true }
  };
  const pOpts = (extra={}) => ({
    responsive: true,
    maintainAspectRatio: true,
    plugins: { legend: { display: false }, tooltip: { callbacks: {} } },
    scales: pScales,
    ...extra
  });

  // ── Season chart ────────────────────────────────────────────────────
  const sGoals   = goals.reduce((m,g)   => { if(g.season) m[g.season]=(m[g.season]||0)+1; return m; }, {});
  const sAssists = assists.reduce((m,g) => { if(g.season) m[g.season]=(m[g.season]||0)+1; return m; }, {});
  const sKeys    = [...new Set([...Object.keys(sGoals), ...Object.keys(sAssists)])].sort();
  playerCharts.season = new Chart(document.getElementById('pcSeasonChart'), {
    type: 'bar',
    data: {
      labels: sKeys.map(s => `${s}/${String(parseInt(s)+1).slice(-2)}`),
      datasets: [
        { label: 'Tore',    data: sKeys.map(s => sGoals[s]||0),   backgroundColor: 'rgba(46,204,113,0.75)', borderRadius: 4 },
        { label: 'Assists', data: sKeys.map(s => sAssists[s]||0), backgroundColor: 'rgba(255,211,42,0.65)', borderRadius: 4 }
      ]
    },
    options: { ...pOpts(), plugins: { legend: { display: true, labels: { color: '#5a6478', font: { size: 11 } } } }, scales: pScales }
  });

  // ── Period chart ────────────────────────────────────────────────────
  const pMap = { 1:0, 2:0, 3:0, 4:0 };
  goals.forEach(g => { if (g.period) pMap[g.period] = (pMap[g.period]||0)+1; });
  playerCharts.period = new Chart(document.getElementById('pcPeriodChart'), {
    type: 'bar',
    data: {
      labels: ['1. Drittel', '2. Drittel', '3. Drittel', 'Verlängerung'],
      datasets: [{ data: [pMap[1],pMap[2],pMap[3],pMap[4]],
        backgroundColor: ['rgba(0,229,255,0.7)','rgba(0,229,255,0.6)','rgba(0,229,255,0.5)','rgba(255,71,87,0.7)'],
        borderRadius: 4 }]
    },
    options: pOpts()
  });

  // ── Minute chart ────────────────────────────────────────────────────
  const minB = Array(13).fill(0); // 5-min buckets 0-65
  goals.forEach(g => {
    if (g.minute_seconds != null) {
      const b = Math.min(Math.floor(g.minute_seconds / 300), 12);
      minB[b]++;
    }
  });
  playerCharts.minute = new Chart(document.getElementById('pcMinuteChart'), {
    type: 'bar',
    data: {
      labels: Array.from({length:13}, (_,i) => `${i*5}–${i*5+5}'`),
      datasets: [{ data: minB, backgroundColor: 'rgba(46,204,113,0.65)', borderRadius: 3 }]
    },
    options: pOpts()
  });

  // ── Home / Away + Score State ───────────────────────────────────────
  let homeG=0, awayG=0, leadG=0, tiedG=0, trailG=0;
  goals.forEach(g => {
    const isHome = g.team_scored_id === g.home_team_id;
    if (isHome) homeG++; else awayG++;
    if (g.score_at_goal) {
      const [h, a] = g.score_at_goal.split(':').map(Number);
      if (!isNaN(h) && !isNaN(a)) {
        const myNow  = isHome ? h : a;
        const oppNow = isHome ? a : h;
        const myPrev = myNow - 1;
        if (myPrev > oppNow) leadG++;
        else if (myPrev === oppNow) tiedG++;
        else trailG++;
      }
    }
  });
  const haMax = Math.max(homeG, awayG, 1);
  const stMax = Math.max(leadG, tiedG, trailG, 1);
  document.getElementById('pcContext').innerHTML = `
    <div style="margin-bottom:18px">
      <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Heim / Auswärts</div>
      ${pBar('Heim',     homeG, haMax, 'var(--score)')}
      ${pBar('Auswärts', awayG, haMax, 'var(--accent)')}
    </div>
    <div>
      <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Spielstand beim Tor</div>
      ${pBar('Führend',       leadG,  stMax, '#2ecc71')}
      ${pBar('Ausgeglichen',  tiedG,  stMax, '#f39c12')}
      ${pBar('Rückstand',     trailG, stMax, 'var(--accent2)')}
    </div>
  `;

  // ── Top Opponents ───────────────────────────────────────────────────
  const oppMap = {};
  goals.forEach(g => {
    const opp = g.team_scored_id === g.home_team_id ? g.away_team_raw : g.home_team_raw;
    if (opp) oppMap[opp] = (oppMap[opp]||0)+1;
  });
  const oppRows = Object.entries(oppMap).sort((a,b)=>b[1]-a[1]).slice(0,12);
  const oppMax  = oppRows[0]?.[1] || 1;
  document.getElementById('pcOpponents').innerHTML = oppRows.length
    ? oppRows.map(([opp, cnt]) => `
        <div class="opp-row">
          <span class="opp-name">${opp}</span>
          <div class="opp-bar-wrap"><div class="opp-bar-fill" style="width:${(cnt/oppMax*100).toFixed(0)}%"></div></div>
          <span class="opp-val">${cnt}</span>
        </div>`).join('')
    : '<div style="color:var(--muted);font-size:12px;padding:8px 0">Keine Daten</div>';

  // ── Assist Network ──────────────────────────────────────────────────
  const giverMap = {};
  goals.forEach(g => { if (g.assist_raw) giverMap[g.assist_raw] = (giverMap[g.assist_raw]||0)+1; });
  const recipMap = {};
  assists.forEach(g => { if (g.scorer_raw) recipMap[g.scorer_raw] = (recipMap[g.scorer_raw]||0)+1; });
  const givers = Object.entries(giverMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const recips = Object.entries(recipMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const aMax   = Math.max(...givers.map(e=>e[1]), ...recips.map(e=>e[1]), 1);
  document.getElementById('pcAssistNet').innerHTML = `
    ${givers.length ? `
      <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Wird assistiert von</div>
      ${givers.map(([n,c]) => `<div class="opp-row">
        <span class="opp-name">${n}</span>
        <div class="opp-bar-wrap"><div class="opp-bar-fill" style="width:${(c/aMax*100).toFixed(0)}%;background:var(--accent3)"></div></div>
        <span class="opp-val" style="color:var(--accent3)">${c}</span>
      </div>`).join('')}
    ` : ''}
    ${recips.length ? `
      <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:${givers.length?'14px':0} 0 8px">Assistiert für</div>
      ${recips.map(([n,c]) => `<div class="opp-row">
        <span class="opp-name">${n}</span>
        <div class="opp-bar-wrap"><div class="opp-bar-fill" style="width:${(c/aMax*100).toFixed(0)}%;background:var(--score)"></div></div>
        <span class="opp-val" style="color:var(--score)">${c}</span>
      </div>`).join('')}
    ` : ''}
    ${!givers.length && !recips.length ? '<div style="color:var(--muted);font-size:12px;padding:8px 0">Keine Daten</div>' : ''}
  `;

  // ── Game Log ────────────────────────────────────────────────────────
  const gameMap = {};
  const ensureGame = (g) => {
    if (!gameMap[g.game_id]) {
      const gm = (DB.games || []).find(x => x.game_id === g.game_id);
      gameMap[g.game_id] = {
        date: g.date, season: g.season,
        home: g.home_team_raw, away: g.away_team_raw,
        result: gm ? gm.result : null,
        teamScoredId: g.team_scored_id, homeId: g.home_team_id,
        goals: [], assists: []
      };
    }
  };
  goals.forEach(g => { ensureGame(g); gameMap[g.game_id].goals.push(g.minute || ''); });
  assists.forEach(g => { ensureGame(g); gameMap[g.game_id].assists.push(g.minute || ''); });

  const logRows = Object.values(gameMap)
    .sort((a,b) => (b.date||'').localeCompare(a.date||''))
    .map(gm => {
      const isHome = gm.teamScoredId === gm.homeId;
      const opp    = isHome ? gm.away : gm.home;
      const ha     = isHome ? '<span style="color:var(--score);font-size:10px">H</span>' : '<span style="color:var(--accent);font-size:10px">A</span>';
      const g      = gm.goals.length, a = gm.assists.length;
      const season = gm.season ? `${gm.season}/${String(gm.season+1).slice(-2)}` : '—';
      const mins   = [...gm.goals.map(m=>`<span style="color:var(--score)">${m}</span>`),
                      ...gm.assists.map(m=>`<span style="color:var(--accent3)">${m}(A)</span>`)].join(' ');
      return `<tr>
        <td style="color:var(--muted);white-space:nowrap">${gm.date||'—'}</td>
        <td>${ha} ${opp||'—'}</td>
        <td style="color:var(--muted)">${gm.result||'—'}</td>
        <td class="${g>0?'gl-g':'gl-none'}">${g>0?g:'—'}</td>
        <td class="${a>0?'gl-a':'gl-none'}">${a>0?a:'—'}</td>
        <td style="font-size:11px">${mins||'—'}</td>
        <td style="color:var(--muted)">${season}</td>
      </tr>`;
    });

  document.getElementById('pcGameLog').innerHTML = `
    <table class="game-log">
      <thead><tr>
        <th>Datum</th><th>Gegner</th><th>Resultat</th>
        <th style="color:var(--score)">G</th>
        <th style="color:var(--accent3)">A</th>
        <th>Minuten</th><th>Saison</th>
      </tr></thead>
      <tbody>${logRows.join('')}</tbody>
    </table>`;

  // ── Player Penalties ────────────────────────────────────────────────────────────────────
  let playerPen = (DB.penalties || []).filter(p => p.player_raw === name);
  if (playerSelectedSeason !== 'all') {
    const s = parseInt(playerSelectedSeason);
    playerPen = playerPen.filter(p => p.season === s);
  }
  const penContainer = document.getElementById('pcPenalties');
  if (penContainer) {
    if (!playerPen.length) {
      penContainer.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:4px 0">Keine Strafdaten</div>';
    } else {
      const penReasons = {};
      playerPen.forEach(p => { penReasons[p.reason] = (penReasons[p.reason]||0)+1; });
      const penPeriods = {1:0,2:0,3:0,4:0};
      playerPen.forEach(p => { if(p.period) penPeriods[p.period]=(penPeriods[p.period]||0)+1; });
      const prMax = Math.max(...Object.values(penReasons),1);
      const ppMax = Math.max(...Object.values(penPeriods),1);
      const penBar = (label, cnt, max, color='#e67e22') => `
        <div class="modal-bar-row">
          <span class="modal-bar-label" title="${label}">${label}</span>
          <div class="modal-bar-track"><div class="modal-bar-fill" style="width:${(cnt/max*100).toFixed(1)}%;background:${color}"></div></div>
          <span class="modal-bar-val">${cnt}</span>
        </div>`;
      const min2 = playerPen.filter(p=>p.duration_min===2).length;
      const min10 = playerPen.filter(p=>p.duration_min>=10).length;
      penContainer.innerHTML = `
        <div class="kpi-row" style="margin-bottom:16px">
          <div class="kpi" style="--accent-color:#e67e22"><div class="kpi-val">${playerPen.length}</div><div class="kpi-label">Strafen total</div></div>
          <div class="kpi" style="--accent-color:var(--accent3)"><div class="kpi-val">${min2}</div><div class="kpi-label">2'-Strafen</div></div>
          <div class="kpi" style="--accent-color:var(--accent2)"><div class="kpi-val">${min10}</div><div class="kpi-label">10'-Strafen</div></div>
        </div>
        <div class="grid-2">
          <div>
            <div class="section-header">Strafgründe</div>
            ${Object.entries(penReasons).sort((a,b)=>b[1]-a[1]).map(([r,c])=>penBar(r,c,prMax)).join('')}
          </div>
          <div>
            <div class="section-header">Nach Drittel</div>
            ${penBar('1. Drittel',penPeriods[1],ppMax,'rgba(0,229,255,0.7)')}
            ${penBar('2. Drittel',penPeriods[2],ppMax,'rgba(0,229,255,0.7)')}
            ${penBar('3. Drittel',penPeriods[3],ppMax,'rgba(0,229,255,0.7)')}
            ${penBar('Verlängerung',penPeriods[4],ppMax,'rgba(255,71,87,0.7)')}
          </div>
        </div>
      `;
    }
  }
}

// ══════════════════════════════════════════════════════════════════════
// LEAGUE PAGE
// ══════════════════════════════════════════════════════════════════════

let leagueSelectedSeason = 'all';
let leagueSelectedLeague = 'all';

function buildLeagueSeasonPills() {
  const c = document.getElementById('leagueSeasonPills');
  if (!c) return;
  c.querySelectorAll('[data-season]:not([data-season="all"])').forEach(b => b.remove());
  (DB.seasons || []).forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'pill'; btn.dataset.season = s;
    btn.textContent = `${s}/${String(s+1).slice(-2)}`;
    btn.onclick = () => setLeagueSeason(btn, String(s));
    c.appendChild(btn);
  });
}

function buildLeagueLeaguePills() {
  const c = document.getElementById('leagueLeaguePills');
  if (!c) return;
  c.querySelectorAll('[data-league]:not([data-league="all"])').forEach(b => b.remove());
  const leagues = [...new Set((DB.games || []).map(g => g.league).filter(Boolean))].sort();
  leagues.forEach(lg => {
    const btn = document.createElement('button');
    btn.className = 'pill'; btn.dataset.league = lg;
    btn.textContent = lg;
    btn.onclick = () => setLeagueLeague(btn, lg);
    c.appendChild(btn);
  });
}

function setLeagueSeason(el, val) {
  document.querySelectorAll('#leagueSeasonPills .pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  leagueSelectedSeason = val;
  renderLeaguePage();
}

function setLeagueLeague(el, val) {
  document.querySelectorAll('#leagueLeaguePills .pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  leagueSelectedLeague = val;
  renderLeaguePage();
}

function leagueFilter(arr) {
  return arr.filter(x => {
    if (leagueSelectedSeason !== 'all' && x.season !== parseInt(leagueSelectedSeason)) return false;
    if (leagueSelectedLeague !== 'all' && x.league !== leagueSelectedLeague) return false;
    return true;
  });
}

function renderLeaguePage() {
  const goals    = leagueFilter(DB.goals    || []);
  const penalties= leagueFilter(DB.penalties|| []);
  const games    = leagueFilter(DB.games    || []);

  // ── Team registry ──────────────────────────────────────────────────
  const teamName = {};
  games.forEach(g => {
    if (g.home_team_id) teamName[g.home_team_id] = g.home_team_raw;
    if (g.away_team_id) teamName[g.away_team_id] = g.away_team_raw;
  });

  // ── Team stats ─────────────────────────────────────────────────────
  const teamStats = {};
  const ensureTeam = id => {
    if (!teamStats[id]) teamStats[id] = { id, gp:0, w:0, l:0, d:0, gf:0, ga:0, pen:0, ppOpp:0, ppG:0, pkOpp:0, pkGA:0, shG:0, gameList:[] };
    return teamStats[id];
  };

  const gamesSorted = [...games].sort((a,b) => (a.date||'').localeCompare(b.date||''));
  gamesSorted.forEach(g => {
    const hid = g.home_team_id, aid = g.away_team_id;
    if (!hid || !aid || !g.result) return;
    const [h,a] = g.result.split(':').map(Number);
    if (isNaN(h)||isNaN(a)) return;
    const ht = ensureTeam(hid); ht.gp++; ht.gf+=h; ht.ga+=a;
    const at = ensureTeam(aid); at.gp++; at.gf+=a; at.ga+=h;
    if (h>a) { ht.w++; at.l++; ht.gameList.push('W'); at.gameList.push('L'); }
    else if (h<a) { at.w++; ht.l++; ht.gameList.push('L'); at.gameList.push('W'); }
    else { ht.d++; at.d++; ht.gameList.push('D'); at.gameList.push('D'); }
  });

  penalties.forEach(p => { if (p.team_id) ensureTeam(p.team_id).pen++; });

  // PP / PK per team
  const pen2 = penalties.filter(p => p.duration_min === 2);
  const gameGoalMap = {};
  goals.forEach(g => { (gameGoalMap[g.game_id] = gameGoalMap[g.game_id]||[]).push(g); });
  const gamePenMap = {};
  pen2.forEach(p => { (gamePenMap[p.game_id] = gamePenMap[p.game_id]||[]).push(p); });
  const gameById = {};
  games.forEach(g => { gameById[g.game_id] = g; });

  Object.entries(gamePenMap).forEach(([gid, pens]) => {
    const gg = gameGoalMap[gid] || [];
    const gm = gameById[gid];
    if (!gm) return;
    pens.forEach(pen => {
      if (!pen.team_id) return;
      const t0 = pen.minute_seconds||0, t1 = t0+120;
      const inW = gg.filter(g => g.minute_seconds!=null && g.minute_seconds>=t0 && g.minute_seconds<=t1);
      const penTeam = ensureTeam(pen.team_id);
      const oppId   = gm.home_team_id===pen.team_id ? gm.away_team_id : gm.home_team_id;
      const oppTeam = oppId ? ensureTeam(oppId) : null;
      penTeam.pkOpp++;
      penTeam.pkGA += inW.filter(g => g.team_scored_id !== pen.team_id).length;
      if (oppTeam) {
        oppTeam.ppOpp++;
        oppTeam.ppG += inW.filter(g => g.team_scored_id === oppId).length;
      }
    });
  });

  // Shorthanded goals (scored while own team is penalized)
  Object.entries(gamePenMap).forEach(([gid, pens]) => {
    const gg = gameGoalMap[gid] || [];
    const gm = gameById[gid];
    if (!gm) return;
    pens.forEach(pen => {
      if (!pen.team_id) return;
      const t0 = pen.minute_seconds||0, t1 = t0+120;
      const shg = gg.filter(g => g.minute_seconds!=null && g.minute_seconds>=t0 && g.minute_seconds<=t1 && g.team_scored_id===pen.team_id);
      if (shg.length) ensureTeam(pen.team_id).shG += shg.length;
    });
  });

  const teamsArr = Object.values(teamStats).filter(t => t.gp > 0);

  // ── Scorer / assist map ────────────────────────────────────────────
  const scorerMap = {};
  goals.forEach(g => {
    if (!g.scorer_raw) return;
    const k = g.scorer_raw;
    if (!scorerMap[k]) scorerMap[k] = { name:k, team:'', goals:0, assists:0, gp:new Set(), hatTricks:{}, p3goals:0, ppGoals:0 };
    scorerMap[k].goals++;
    scorerMap[k].gp.add(g.game_id);
    scorerMap[k].hatTricks[g.game_id] = (scorerMap[k].hatTricks[g.game_id]||0)+1;
    if (!scorerMap[k].team && g.team_scored_raw) scorerMap[k].team = g.team_scored_raw;
    if (parseInt(g.period)>=3) scorerMap[k].p3goals++;
  });
  goals.forEach(g => {
    if (!g.assist_raw) return;
    if (!scorerMap[g.assist_raw]) scorerMap[g.assist_raw] = { name:g.assist_raw, team:'', goals:0, assists:0, gp:new Set(), hatTricks:{}, p3goals:0, ppGoals:0 };
    scorerMap[g.assist_raw].assists++;
    scorerMap[g.assist_raw].gp.add(g.game_id);
    if (!scorerMap[g.assist_raw].team && g.team_scored_raw) scorerMap[g.assist_raw].team = g.team_scored_raw;
  });

  // PP goals: goals scored during opponent's 2-min penalty window
  Object.entries(gamePenMap).forEach(([gid, pens]) => {
    const gg = gameGoalMap[gid] || [];
    const gm = gameById[gid];
    if (!gm) return;
    pens.forEach(pen => {
      if (!pen.team_id) return;
      const t0 = pen.minute_seconds||0, t1 = t0+120;
      const oppId = gm.home_team_id===pen.team_id ? gm.away_team_id : gm.home_team_id;
      gg.filter(g => g.minute_seconds!=null && g.minute_seconds>=t0 && g.minute_seconds<=t1 && g.team_scored_id===oppId)
        .forEach(g => { if (g.scorer_raw && scorerMap[g.scorer_raw]) scorerMap[g.scorer_raw].ppGoals++; });
    });
  });

  const scorers = Object.values(scorerMap).map(p => ({
    ...p, pts: p.goals+p.assists, gpCount: p.gp.size,
    gpg: p.gp.size ? (p.goals/p.gp.size).toFixed(2) : 0,
    hts: Object.values(p.hatTricks).filter(n=>n>=3).length
  })).sort((a,b) => b.pts-a.pts || b.goals-a.goals);

  // ── Advanced Clutch Score ────────────────────────────────────────
  // Per-goal weight = situationMult × timingMult × impactMult × closenessMult
  //
  //  situationMult  — score state BEFORE this goal (how far behind were you?)
  //  timingMult     — how late in the game was it? (OT > last 5 of P3 > P1)
  //  impactMult     — what did this goal DO? (OT winner > comeback > go-ahead > tying)
  //  closenessMult  — how tight was the final result? (1-goal game > blowout)
  const clutchData = {};
  const finalRes = {};
  games.forEach(g => {
    if (!g.result) return;
    const [h,a] = g.result.split(':').map(Number);
    if (!isNaN(h) && !isNaN(a)) finalRes[g.game_id] = { h, a, str: g.result };
  });

  goals.forEach(goal => {
    if (!goal.scorer_raw || !goal.score_at_goal) return;
    const [sh, sa] = goal.score_at_goal.split(':').map(Number);
    if (isNaN(sh) || isNaN(sa)) return;

    const isHome   = goal.team_scored_id === goal.home_team_id;
    const myAfter  = isHome ? sh : sa;
    const oppAfter = isHome ? sa : sh;
    const myBefore = myAfter - 1;
    // deficit = how far the scoring team was behind before this goal
    const deficit  = oppAfter - myBefore;

    // ── Situation multiplier ─────────────────────────────────────
    let situMult;
    if      (deficit >= 2)  situMult = 2.2;  // team was 2+ down → comeback goal
    else if (deficit === 1) situMult = 2.6;  // team was 1 down → equaliser or comeback
    else if (deficit === 0) situMult = 1.8;  // game was tied
    else if (deficit === -1) situMult = 1.0; // team was up by 1
    else if (deficit === -2) situMult = 0.5; // team was up by 2
    else                    situMult = 0.2;  // blowout, low pressure

    // ── Timing multiplier ────────────────────────────────────────
    const period = parseInt(goal.period) || 1;
    const ms = goal.minute_seconds || 0;
    const isOT = period >= 4;
    let timeMult;
    if      (isOT)                       timeMult = 3.2; // overtime = maximum tension
    else if (period === 3 && ms >= 3300) timeMult = 2.2; // last 5 min of P3
    else if (period === 3 && ms >= 3000) timeMult = 1.7; // last 10 min of P3
    else if (period === 3)               timeMult = 1.3;
    else if (period === 2 && ms >= 3000) timeMult = 1.0;
    else if (period === 2)               timeMult = 0.9;
    else                                 timeMult = 0.7; // 1st period = low urgency

    // ── Impact type ──────────────────────────────────────────────
    const isTying    = myAfter === oppAfter;                         // now tied (was behind)
    const isGoAhead  = myAfter > oppAfter && myBefore === oppAfter;  // was tied, now leading
    const isComeback = myAfter > oppAfter && myBefore < oppAfter;    // was behind, now leading

    const fin    = finalRes[goal.game_id];
    const wonGame = fin && (isHome ? fin.h > fin.a : fin.a > fin.h);
    // GWG = goal that creates the final scoreline (last goal of game, by the winner)
    const isGWG  = !isOT && wonGame && goal.score_at_goal === fin?.str;
    const isOTW  =  isOT && wonGame && goal.score_at_goal === fin?.str;

    // ── Closeness multiplier ─────────────────────────────────────
    const margin = fin ? Math.abs(fin.h - fin.a) : 3;
    const closeMult = margin === 1 ? 1.6 : margin === 2 ? 1.2 : margin === 3 ? 1.0 : 0.6;

    // ── Impact multiplier ────────────────────────────────────────
    let impactMult = 1.0;
    if      (isOTW)       impactMult = 4.0; // OT winner: instant hero
    else if (isGWG)       impactMult = 2.8; // game-winning goal
    else if (isComeback)  impactMult = 2.5; // scoring while behind to take lead
    else if (isGoAhead)   impactMult = 2.0; // tying then leading
    else if (isTying)     impactMult = 1.8; // tying the game

    const cScore = situMult * timeMult * impactMult * closeMult;

    const k = goal.scorer_raw;
    if (!clutchData[k]) clutchData[k] = {
      score:0, gwg:0, otw:0, comebackG:0, goAheadG:0, tyingG:0, lateG:0,
      team: goal.team_scored_raw || ''
    };
    clutchData[k].score      += cScore;
    if (isOTW)       clutchData[k].otw++;
    if (isGWG)       clutchData[k].gwg++;
    if (isComeback)  clutchData[k].comebackG++;
    if (isGoAhead)   clutchData[k].goAheadG++;
    if (isTying)     clutchData[k].tyingG++;
    if (isOT || (period === 3 && ms >= 3000)) clutchData[k].lateG++;
    if (!clutchData[k].team && goal.team_scored_raw) clutchData[k].team = goal.team_scored_raw;
  });

  const clutchLeaders = Object.entries(clutchData)
    .map(([name,d]) => ({ name, ...d }))
    .filter(p => p.score > 0)
    .sort((a,b) => b.score - a.score);

  // Merge clutch score into scorer lookup for the table
  clutchLeaders.forEach(cl => {
    if (scorerMap[cl.name]) scorerMap[cl.name].clutchScore = cl.score;
  });

  // ── Penalty leaders ────────────────────────────────────────────────
  const penMap = {};
  penalties.forEach(p => {
    if (!p.player_raw) return;
    if (!penMap[p.player_raw]) penMap[p.player_raw] = { name:p.player_raw, team:p.team_raw||'', total:0, min2:0, min10:0 };
    penMap[p.player_raw].total++;
    if (p.duration_min===2)  penMap[p.player_raw].min2++;
    if (p.duration_min>=10)  penMap[p.player_raw].min10++;
  });
  const penLeaders = Object.values(penMap).sort((a,b)=>b.total-a.total);

  // ── Scoring patterns ───────────────────────────────────────────────
  const gByPeriod = {};
  goals.forEach(g => { const p=parseInt(g.period)||0; gByPeriod[p]=(gByPeriod[p]||0)+1; });
  const gByBucket = {};
  goals.forEach(g => {
    if (g.minute_seconds==null) return;
    const b = Math.floor(g.minute_seconds/300);
    gByBucket[b]=(gByBucket[b]||0)+1;
  });

  // ── Interesting facts ──────────────────────────────────────────────
  const goalsByGame = {};
  goals.forEach(g => { (goalsByGame[g.game_id]=goalsByGame[g.game_id]||[]).push(g); });
  const highGame = games.map(g => ({
    home:g.home_team_raw, away:g.away_team_raw, result:g.result, date:g.date,
    total:(goalsByGame[g.game_id]||[]).length
  })).sort((a,b)=>b.total-a.total)[0];

  const totalHTs   = scorers.reduce((s,p)=>s+p.hts,0);
  const bestPPTeam = teamsArr.filter(t=>t.ppOpp>=3).sort((a,b)=>(b.ppG/b.ppOpp)-(a.ppG/a.ppOpp))[0];
  const bestPKTeam = teamsArr.filter(t=>t.pkOpp>=3).sort((a,b)=>((a.pkGA/a.pkOpp)-(b.pkGA/b.pkOpp)))[0];
  const mostPenTeam= teamsArr.sort((a,b)=>b.pen-a.pen)[0];
  const clutchKing = clutchLeaders[0] || null;
  const ppKing     = [...scorers].filter(p=>p.ppGoals>0).sort((a,b)=>b.ppGoals-a.ppGoals)[0];

  // ── Form streak helper ────────────────────────────────────────────
  const formDot = r => {
    const col = r==='W'?'#2ecc71':r==='L'?'#e74c3c':'#95a5a6';
    return `<span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:${col};margin:1px" title="${r}"></span>`;
  };
  const streak = gl => {
    if (!gl.length) return '';
    const last = gl[gl.length-1]; let n=0;
    for (let i=gl.length-1;i>=0&&gl[i]===last;i--) n++;
    const col = last==='W'?'#2ecc71':last==='L'?'#e74c3c':'#95a5a6';
    return `<span style="color:${col};font-weight:700;font-size:12px">${last}${n}</span>`;
  };

  // ── CSS bar helper ────────────────────────────────────────────────
  const bar = (val, max, color='var(--accent)') =>
    `<div style="background:var(--card-bg2,#2a2a2a);border-radius:3px;height:6px;width:80px;display:inline-block;vertical-align:middle">
      <div style="background:${color};width:${max>0?Math.round(val/max*100):0}%;height:100%;border-radius:3px"></div>
    </div>`;

  const th = (t,tip='') => `<th title="${tip}">${t}</th>`;
  const tbl = (heads, rows, maxH=320) =>
    `<div style="overflow-y:auto;max-height:${maxH}px"><table class="game-log" style="width:100%">
      <thead><tr>${heads}</tr></thead><tbody>${rows}</tbody>
    </table></div>`;

  // ── Render ─────────────────────────────────────────────────────────
  const otGoals = (gByPeriod[4]||0)+(gByPeriod[5]||0);
  const avgPenPerGame = games.length ? (penalties.length/games.length).toFixed(1) : '—';

  // Period bar chart data
  const pLabels = ['1. P','2. P','3. P','OT'];
  const pVals   = [gByPeriod[1]||0, gByPeriod[2]||0, gByPeriod[3]||0, otGoals];
  const pMax    = Math.max(...pVals, 1);

  // 5-min bucket chart (0–65 min)
  const bucketLabels = [], bucketVals = [];
  for (let b=0; b<=12; b++) {
    bucketLabels.push(`${b*5}'`);
    bucketVals.push(gByBucket[b]||0);
  }
  const bMax = Math.max(...bucketVals, 1);

  // Special teams sorted by PP%
  const ppTeams = teamsArr.filter(t=>t.ppOpp>=3)
    .map(t=>({...t, ppPct:t.ppG/t.ppOpp*100, pkPct:(t.pkOpp-t.pkGA)/t.pkOpp*100}))
    .sort((a,b)=>b.ppPct-a.ppPct);
  const maxPP = Math.max(...ppTeams.map(t=>t.ppPct), 1);
  const maxPK = Math.max(...ppTeams.sort((a,b)=>b.pkPct-a.pkPct).map(t=>t.pkPct), 1);
  ppTeams.sort((a,b)=>b.ppPct-a.ppPct);

  // Current form (last 5)
  const formTeams = teamsArr.filter(t=>t.gp>0)
    .map(t=>({...t, last5:t.gameList.slice(-5)}))
    .sort((a,b)=>{
      const ws=(r)=>r.filter(x=>x==='W').length-r.filter(x=>x==='L').length;
      return ws(b.last5)-ws(a.last5);
    });

  document.getElementById('leagueContent').innerHTML = `

    <!-- KPI strip -->
    <div class="kpi-row" style="margin-bottom:20px">
      <div class="kpi" style="--accent-color:var(--accent)">
        <div class="kpi-val">${games.length}</div><div class="kpi-label">Spiele</div>
      </div>
      <div class="kpi" style="--accent-color:var(--score)">
        <div class="kpi-val">${goals.length}</div><div class="kpi-label">Tore</div>
      </div>
      <div class="kpi" style="--accent-color:var(--accent)">
        <div class="kpi-val">${games.length?(goals.length/games.length).toFixed(2):'—'}</div><div class="kpi-label">Tore / Spiel</div>
      </div>
      <div class="kpi" style="--accent-color:#e67e22">
        <div class="kpi-val">${penalties.length}</div><div class="kpi-label">Strafen</div>
      </div>
      <div class="kpi" style="--accent-color:#e67e22">
        <div class="kpi-val">${avgPenPerGame}</div><div class="kpi-label">Strafen / Spiel</div>
      </div>
      <div class="kpi" style="--accent-color:var(--accent3)">
        <div class="kpi-val">${totalHTs}</div><div class="kpi-label">Hat-Tricks</div>
      </div>
    </div>

    <!-- Top cards row -->
    <div class="grid-3" style="margin-bottom:20px">

      <!-- Highlights -->
      <div class="card" style="margin:0">
        <div class="card-title"><span class="dot" style="background:var(--accent3)"></span>Liga-Highlights</div>
        ${highGame ? `<div class="opp-row"><span class="opp-name">🏆 Höchstes Ergebnis</span><span style="color:var(--accent3);font-weight:600">${highGame.total} Tore</span></div>
        <div style="font-size:11px;color:var(--muted);padding:2px 0 10px">${highGame.home} vs ${highGame.away} — ${highGame.result} · ${highGame.date||''}</div>` : ''}
        ${bestPPTeam ? `<div class="opp-row"><span class="opp-name">⚡ Bestes Powerplay</span><span style="color:var(--score);font-weight:600">${teamName[bestPPTeam.id]}</span></div>
        <div style="font-size:11px;color:var(--muted);padding:2px 0 10px">${bestPPTeam.ppG}/${bestPPTeam.ppOpp} Chancen = <strong>${(bestPPTeam.ppG/bestPPTeam.ppOpp*100).toFixed(1)}%</strong></div>` : ''}
        ${bestPKTeam ? `<div class="opp-row"><span class="opp-name">🛡 Bestes Boxplay</span><span style="color:var(--score);font-weight:600">${teamName[bestPKTeam.id]}</span></div>
        <div style="font-size:11px;color:var(--muted);padding:2px 0 10px">${bestPKTeam.pkOpp-bestPKTeam.pkGA}/${bestPKTeam.pkOpp} gehalten = <strong>${((bestPKTeam.pkOpp-bestPKTeam.pkGA)/bestPKTeam.pkOpp*100).toFixed(1)}%</strong></div>` : ''}
        ${clutchKing ? `<div class="opp-row"><span class="opp-name">🔥 Clutch-Spieler</span><span style="color:var(--accent3);font-weight:600">${clutchKing.name}</span></div>
        <div style="font-size:11px;color:var(--muted);padding:2px 0 10px">Score ${clutchKing.score.toFixed(0)} · ${[clutchKing.otw?`${clutchKing.otw} OT-Winner`:'', clutchKing.gwg?`${clutchKing.gwg} GWG`:'', clutchKing.comebackG?`${clutchKing.comebackG} Comeback`:'', clutchKing.tyingG?`${clutchKing.tyingG} Ausgleich`:''].filter(Boolean).join(' · ')||'Späte Tore'} · ${clutchKing.team}</div>` : ''}
        ${ppKing ? `<div class="opp-row"><span class="opp-name">⚡ PP-Torschütze</span><span style="color:var(--score);font-weight:600">${ppKing.name}</span></div>
        <div style="font-size:11px;color:var(--muted);padding:2px 0 4px">${ppKing.ppGoals} Powerplay-Tore · ${ppKing.team}</div>` : ''}
      </div>

      <!-- Top 3 scorers -->
      <div class="card" style="margin:0">
        <div class="card-title"><span class="dot" style="background:var(--score)"></span>Beste Torschützen</div>
        ${scorers.slice(0,5).map((p,i) => `
          <div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;color:${i===0?'#f1c40f':i===1?'#9e9e9e':i===2?'#cd7f32':'var(--muted)'};width:24px;text-align:center">${i+1}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
              <div style="font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.team}</div>
            </div>
            <div style="text-align:right;white-space:nowrap">
              <span style="color:var(--score);font-weight:700">${p.goals}G</span>
              <span style="color:var(--muted);font-size:11px;margin-left:4px">${p.assists}A</span>
              <span style="color:var(--accent);font-weight:700;margin-left:4px">${p.pts}Pts</span>
            </div>
          </div>`).join('')}
      </div>

      <!-- Top 3 assisters -->
      <div class="card" style="margin:0">
        <div class="card-title"><span class="dot" style="background:var(--accent)"></span>Beste Vorlagengeber</div>
        ${[...Object.values(scorerMap)].sort((a,b)=>b.assists-a.assists).slice(0,5).map((p,i) => `
          <div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;color:${i===0?'#f1c40f':i===1?'#9e9e9e':i===2?'#cd7f32':'var(--muted)'};width:24px;text-align:center">${i+1}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
              <div style="font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.team}</div>
            </div>
            <div style="text-align:right;white-space:nowrap">
              <span style="color:var(--accent);font-weight:700">${p.assists}A</span>
              <span style="color:var(--muted);font-size:11px;margin-left:4px">${p.goals}G</span>
              <span style="color:var(--accent);font-weight:700;margin-left:4px">${p.goals+p.assists}Pts</span>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <!-- ── SECTION: Form & Special Teams (season only) ── -->
    ${leagueSelectedSeason !== 'all' ? `
    <div class="sec-hdr" id="sh-lform" onclick="toggleSec('lform')">
      <span>Form & Special Teams</span><span class="sec-arrow">▾</span>
    </div>
    <div class="sec-body" id="sb-lform">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">

      <!-- Team form -->
      <div class="card" style="margin:0">
        <div class="card-title"><span class="dot" style="background:var(--accent2)"></span>Aktuelle Form (letzte 5 Spiele)</div>
        <table class="game-log" style="width:100%">
          <thead><tr>
            <th>Team</th><th>Sp</th><th style="color:var(--score)">S</th><th style="color:var(--concede)">N</th>
            <th>Form</th><th>Streak</th>
          </tr></thead>
          <tbody>
          ${formTeams.map(t => `<tr>
            <td style="font-weight:600;color:var(--text);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${teamName[t.id]||'?'}</td>
            <td style="color:var(--muted)">${t.gp}</td>
            <td style="color:var(--score)">${t.w}</td>
            <td style="color:var(--concede)">${t.l}</td>
            <td style="white-space:nowrap">${t.last5.map(formDot).join('')}</td>
            <td>${streak(t.gameList)}</td>
          </tr>`).join('')}
          </tbody>
        </table>
      </div>

      <!-- Special Teams ranking -->
      <div class="card" style="margin:0">
        <div class="card-title"><span class="dot" style="background:var(--score)"></span>Special Teams — PP% / PK%</div>
        <table class="game-log" style="width:100%">
          <thead><tr>
            <th>Team</th>
            <th title="Powerplay-Effizienz">PP%</th>
            <th title="Boxplay-Effizienz">PK%</th>
            <th title="Shorthanded Goals">SHG</th>
          </tr></thead>
          <tbody>
          ${ppTeams.map(t => `<tr>
            <td style="font-weight:600;color:var(--text);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${teamName[t.id]||'?'}</td>
            <td>
              <span style="color:var(--score);font-weight:700;margin-right:6px">${t.ppPct.toFixed(1)}%</span>
              ${bar(t.ppPct, maxPP, 'var(--score)')}
            </td>
            <td>
              <span style="color:var(--accent3);font-weight:700;margin-right:6px">${t.pkPct.toFixed(1)}%</span>
              ${bar(t.pkPct, maxPK, 'var(--accent3)')}
            </td>
            <td style="color:var(--accent2);font-weight:${t.shG>0?700:400}">${t.shG>0?t.shG:'—'}</td>
          </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
    </div><!-- /sb-lform -->
    ` : ''}

    <!-- ── SECTION: Scoring Patterns ── -->
    <div class="sec-hdr" id="sh-lpatterns" onclick="toggleSec('lpatterns')">
      <span>Scoring-Muster</span><span class="sec-arrow">▾</span>
    </div>
    <div class="sec-body" id="sb-lpatterns">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">

      <!-- Goals by period -->
      <div class="card" style="margin:0">
        <div class="card-title"><span class="dot" style="background:var(--accent)"></span>Tore nach Drittel</div>
        ${pLabels.map((lbl,i) => {
          const v=pVals[i], pct=pMax>0?v/pMax*100:0;
          const col = i===3?'var(--accent2)':'var(--accent)';
          return `<div style="display:flex;align-items:center;gap:10px;margin:6px 0">
            <div style="width:32px;color:var(--muted);font-size:12px;text-align:right">${lbl}</div>
            <div style="flex:1;background:var(--card-bg2,#2a2a2a);border-radius:4px;height:20px;position:relative">
              <div style="background:${col};width:${pct}%;height:100%;border-radius:4px;transition:width .3s"></div>
            </div>
            <div style="width:40px;text-align:right;font-weight:600;color:var(--text)">${v}</div>
            <div style="width:36px;text-align:right;color:var(--muted);font-size:11px">${goals.length?(v/goals.length*100).toFixed(0):'0'}%</div>
          </div>`;
        }).join('')}
        <div style="font-size:11px;color:var(--muted);margin-top:8px">${otGoals} Tore in Verlängerung (${goals.length?(otGoals/goals.length*100).toFixed(1):0}% aller Tore)</div>
      </div>

      <!-- Goals by 5-min bucket -->
      <div class="card" style="margin:0">
        <div class="card-title"><span class="dot" style="background:var(--accent3)"></span>Tore nach Spielminute</div>
        <div style="display:flex;align-items:flex-end;gap:3px;height:80px;padding-bottom:2px">
          ${bucketVals.map((v,i) => {
            const h = bMax>0?Math.round(v/bMax*72):0;
            const col = i<6?'var(--accent)':i<12?'var(--accent3)':'var(--accent2)';
            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px" title="${bucketLabels[i]}: ${v} Tore">
              <div style="background:${col};width:100%;height:${h}px;border-radius:2px 2px 0 0;min-height:${v?2:0}px"></div>
            </div>`;
          }).join('')}
        </div>
        <div style="display:flex;gap:3px;padding-top:2px">
          ${bucketLabels.map((l,i)=>`<div style="flex:1;text-align:center;font-size:9px;color:var(--muted);overflow:hidden">${i%3===0?l:''}</div>`).join('')}
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:6px">
          Heisseste Phase: ${bucketLabels[bucketVals.indexOf(bMax)]}–${(bucketVals.indexOf(bMax)+1)*5}' mit ${bMax} Toren
        </div>
      </div>
    </div>
    </div><!-- /sb-lpatterns -->

    <!-- ── SECTION: Clutch Ranking ── -->
    <div class="sec-hdr" id="sh-lclutch" onclick="toggleSec('lclutch')">
      <span>Clutch-Ranking</span><span class="sec-arrow">▾</span>
    </div>
    <div class="sec-body" id="sb-lclutch">
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--accent3)"></span>Clutch-Ranking
        <span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:8px">Score = Situation × Zeitpunkt × Torwertigkeit × Spielenge</span>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5">
        Jedes Tor wird gewichtet nach: <strong>Spielstand davor</strong> (Rückstand = höher) · <strong>Spielzeit</strong> (OT &gt; letzte 5 min &gt; P1) · <strong>Tortyp</strong> (OT-Winner &gt; GWG &gt; Comeback &gt; Ausgleich) · <strong>Spielenge</strong> (1-Tor-Spiel = ×1.6)
      </div>
      ${(()=>{
        const maxScore = clutchLeaders[0]?.score || 1;
        return tbl(
          th('#') + th('Spieler') + th('Team') +
          `<th style="color:var(--accent3)" title="Gesamter Clutch-Score">Score</th>` +
          `<th title="Clutch-Score als Balken"> </th>` +
          `<th title="OT-Winner — Siegtreffer in der Verlängerung" style="color:var(--accent2)">OTW</th>` +
          `<th title="Game-Winning Goal — letztes Tor des Spiels beim Sieger" style="color:var(--score)">GWG</th>` +
          `<th title="Comeback-Tor — Rückstand aufgeholt und Führung übernommen" style="color:#e67e22">CB</th>` +
          `<th title="Go-Ahead Goal — Führungstor aus dem Gleichstand heraus" style="color:var(--accent)">GA</th>` +
          `<th title="Ausgleichstor — Rückstand egalisiert" style="color:var(--muted)">EQ</th>` +
          `<th title="Späte Tore — letzten 10 min P3 oder OT" style="color:var(--accent3)">Spät</th>`,
          clutchLeaders.slice(0,25).map((p,i) => {
            const barW = Math.round(p.score / maxScore * 100);
            const scoreColor = i===0?'var(--accent3)':i<3?'var(--score)':'var(--text)';
            return `<tr>
              <td style="color:var(--muted);width:24px">${i+1}</td>
              <td style="font-weight:600;color:var(--text)">${p.name}</td>
              <td style="color:var(--muted);font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.team}</td>
              <td style="color:${scoreColor};font-weight:700;font-family:'Barlow Condensed',sans-serif;font-size:16px">${p.score.toFixed(1)}</td>
              <td style="min-width:80px">
                <div style="background:var(--card-bg2,#2a2a2a);border-radius:3px;height:6px">
                  <div style="background:var(--accent3);width:${barW}%;height:100%;border-radius:3px"></div>
                </div>
              </td>
              <td style="color:var(--accent2);font-weight:${p.otw?700:400}">${p.otw||'—'}</td>
              <td style="color:var(--score);font-weight:${p.gwg?700:400}">${p.gwg||'—'}</td>
              <td style="color:#e67e22;font-weight:${p.comebackG?700:400}">${p.comebackG||'—'}</td>
              <td style="color:var(--accent)">${p.goAheadG||'—'}</td>
              <td style="color:var(--muted)">${p.tyingG||'—'}</td>
              <td style="color:var(--accent3)">${p.lateG||'—'}</td>
            </tr>`;
          }).join(''), 480
        );
      })()}
    </div>

    </div><!-- /sb-lclutch -->

    <!-- ── SECTION: Torjäger ── -->
    <div class="sec-hdr" id="sh-lscorers" onclick="toggleSec('lscorers')">
      <span>Torjäger-Liste (${scorers.filter(p=>p.goals>0).length} Spieler)</span><span class="sec-arrow">▾</span>
    </div>
    <div class="sec-body" id="sb-lscorers">
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--score)"></span>Torjäger-Liste (alle ${scorers.filter(p=>p.goals>0).length} Torschützen)</div>
      ${tbl(
        th('#')+th('Spieler')+th('Team')+th('Sp')+
        `<th style="color:var(--score)">G</th><th style="color:var(--accent3)">A</th><th style="color:var(--accent)">Pts</th>`+
        th('G/Sp','Goals per Game')+th('PP','Powerplay-Tore')+
        `<th title="Clutch-Score — gewichteter Wert nach Situation, Zeitpunkt, Tortyp und Spielenge" style="color:var(--accent3)">Clutch</th>`+
        th('HT','Hat-Tricks'),
        scorers.filter(p=>p.goals>0).map((p,i) => {
          const cs = p.clutchScore;
          const csDisplay = cs ? cs.toFixed(1) : '—';
          const csColor   = cs >= 50 ? 'var(--accent3)' : cs >= 20 ? 'var(--score)' : 'var(--muted)';
          return `<tr>
            <td style="color:var(--muted);width:28px">${i+1}</td>
            <td style="font-weight:600;color:var(--text)">${p.name}</td>
            <td style="color:var(--muted);font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.team}</td>
            <td>${p.gpCount}</td>
            <td style="color:var(--score);font-weight:700">${p.goals}</td>
            <td style="color:var(--accent3);font-weight:700">${p.assists}</td>
            <td style="color:var(--accent);font-weight:700">${p.pts}</td>
            <td style="color:var(--muted)">${p.gpg}</td>
            <td style="color:var(--score)">${p.ppGoals>0?p.ppGoals:'—'}</td>
            <td style="color:${csColor};font-weight:${cs>=20?700:400}">${csDisplay}</td>
            <td style="color:#e67e22">${p.hts>0?p.hts:'—'}</td>
          </tr>`;
        }).join(''),
        520
      )}
    </div>

    </div><!-- /sb-lscorers -->

    <!-- ── SECTION: Strafenliste ── -->
    <div class="sec-hdr" id="sh-lpen" onclick="toggleSec('lpen')">
      <span>Strafenliste (${penLeaders.length} Spieler)</span><span class="sec-arrow">▾</span>
    </div>
    <div class="sec-body" id="sb-lpen">
    <div class="card">
      <div class="card-title"><span class="dot" style="background:#e67e22"></span>Strafenliste (alle ${penLeaders.length} Spieler)</div>
      ${tbl(
        th('#')+th('Spieler')+th('Team')+
        `<th style="color:#e67e22">Total</th><th style="color:var(--accent3)">2\'</th><th style="color:var(--accent2)">10\'</th>`,
        penLeaders.map((p,i) => `<tr>
          <td style="color:var(--muted);width:28px">${i+1}</td>
          <td style="font-weight:600;color:var(--text)">${p.name}</td>
          <td style="color:var(--muted);font-size:11px">${p.team}</td>
          <td style="color:#e67e22;font-weight:700">${p.total}</td>
          <td style="color:var(--accent3)">${p.min2}</td>
          <td style="color:var(--accent2)">${p.min10}</td>
        </tr>`).join(''),
        420
      )}
    </div>
    </div><!-- /sb-lpen -->
  `;

  // Apply collapsible states for league page
  const lgSecs = { lpatterns: true, lscorers: false, lpen: false };
  if (leagueSelectedSeason !== 'all') lgSecs.lform = true;
  initSecs(lgSecs);
}

// ── Boot: fetch data.json ─────────────────────────────────────────────────
fetch('data.json')
  .then(r => { if (!r.ok) throw new Error('data.json nicht gefunden'); return r.json(); })
  .then(data => {
    DB = data;
    const ng = DB.games?.length || 0, nl = DB.goals?.length || 0;
    document.getElementById('subtitle').textContent = `${ng} Spiele · ${nl} Tore`;
    init();
  })
  .catch(err => {
    document.getElementById('mainContent').innerHTML = `
      <div class="no-data">
        <strong>⚠ Fehler: data.json konnte nicht geladen werden</strong><br><br>
        Stelle sicher dass <code>data.json</code> im gleichen Ordner liegt und du einen lokalen
        Server verwendest:<br><br>
        <code>python -m http.server 8000</code><br><br>
        Dann öffne: <a href="http://localhost:8000" style="color:var(--accent)">http://localhost:8000</a>
      </div>`;
    console.error(err);
  });
</script>
</body>
</html>
