name: Fetch upcoming games

on:
  schedule:
    - cron: '0 5 * * *'   # every day at 05:00 UTC
  workflow_dispatch:

jobs:
  upcoming:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch upcoming games and push to Supabase
        run: python fetch_upcoming.py
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
