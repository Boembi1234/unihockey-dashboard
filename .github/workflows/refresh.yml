name: Refresh data

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC — games show up within 24h
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15     # Should finish in < 2 minutes

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download DB from release (if exists)
        run: |
          gh release download update --pattern "*.db" --dir . 2>/dev/null \
            && echo "DB restored from release" \
            || echo "No cached DB found, starting fresh"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fast daily refresh
        run: python fetch_daily.py
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Upload updated DB to release
        run: |
          gh release delete update --yes 2>/dev/null || true
          gh release create update swiss_floorball_lupl.db \
            --title "DB Cache" --notes "Auto-updated DB" --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
